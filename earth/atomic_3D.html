<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ATOM4LOVE — Signature Vibratoire 3D</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#canvas-container { position: fixed; inset: 0; }

/* ── Toggle switch Earth / Goldberg ── */
#mode-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,.6); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.15); border-radius: 30px;
    padding: 10px 20px; pointer-events: auto;
}
.mode-label { font-size: 12px; color: rgba(255,255,255,.55); letter-spacing: .5px; }
.mode-label.active { color: #00ffcc; }
.switch { position: relative; width: 48px; height: 26px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute; inset: 0; border-radius: 26px;
    background: rgba(255,255,255,.12); cursor: pointer; transition: .35s;
}
.slider::before {
    content: ''; position: absolute; width: 20px; height: 20px;
    border-radius: 50%; background: #fff; left: 3px; top: 3px; transition: .35s;
}
input:checked + .slider { background: rgba(0,255,204,.35); }
input:checked + .slider::before { transform: translateX(22px); background: #00ffcc; }

/* ── Overlay boutons ── */
#ui-bar {
    position: fixed; top: 14px; right: 14px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.ui-btn {
    background: rgba(0,0,0,.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.85);
    padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;
    transition: border-color .2s, color .2s;
}
.ui-btn:hover { border-color: rgba(0,255,204,.5); color: #00ffcc; }

/* ── HUD ── */
#hud {
    position: fixed; bottom: 80px; left: 14px;
    font-size: 10px; color: rgba(255,255,255,.35);
    font-family: monospace; pointer-events: none; line-height: 1.6;
}

/* ── Info KIN ── */
#kin-panel {
    position: fixed; top: 14px; left: 14px; z-index: 200;
    background: rgba(0,0,0,.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.12); border-radius: 12px;
    padding: 10px 14px; font-size: 11px; color: rgba(255,255,255,.65);
    max-width: 160px; line-height: 1.7; display: none;
}
</style>
</head>
<body>
<div id="canvas-container"></div>

<!-- Info KIN -->
<div id="kin-panel"></div>

<!-- Boutons haut-droite -->
<div id="ui-bar">
    <button class="ui-btn" onclick="history.back()">← Retour</button>
    <button class="ui-btn" id="btn-anim" onclick="_toggleAnim()">⏸ Pause</button>
</div>

<!-- Toggle Goldberg ↔ Terre -->
<div id="mode-bar">
    <span class="mode-label active" id="lbl-goldberg">◯ Goldberg</span>
    <label class="switch">
        <input type="checkbox" id="earth-switch" onchange="_onEarthToggle(this.checked)">
        <span class="slider"></span>
    </label>
    <span class="mode-label" id="lbl-earth">🌍 Terre</span>
</div>

<div id="hud">Initialisation…</div>

<script src="p5.min.js"></script>
<script src="phi2x.js"></script>
<script>
'use strict';

// ── Données depuis URL params ou localStorage ──────────────────────────────
function _gp(key, fallback) {
    const p = new URLSearchParams(location.search).get(key);
    return p !== null ? parseFloat(p) : (parseFloat(localStorage.getItem('a4l_' + key)) || fallback);
}
const LAT_B  = _gp('latB',  48.8566);   // lieu de naissance
const LON_B  = _gp('lonB',  2.3522);
const LAT_C  = _gp('latC',  LAT_B);     // lieu de conception
const LON_C  = _gp('lonC',  LON_B);
const PHI_B  = _gp('phiB',  1.618);     // phases Double Bang
const PHI_C  = _gp('phiC',  2.718);
const COH    = _gp('coh',   0.72);      // cohérence spirale [0-1]
const BORN   = _gp('born',  245658600); // unix timestamp naissance
const KIN_B  = Phi2X ? (() => {
    const d = new Date(BORN * 1000);
    return Phi2X.calcKin(d.getFullYear(), d.getMonth()+1, d.getDate());
})() : null;

// ── État global ────────────────────────────────────────────────────────────
let _showEarth = false;
let _animRunning = true;
let _camRotX = 0, _camRotY = 0;
let _targetRotX = 0, _targetRotY = 0;
let _spiralBirthFrame = 0;
let frameTime = 0;

let meshVertices = [], meshEdges = [], _projBuffer = null;
let _earthGL = null, _earthTex = null;

// ── Couleurs alchimiques depuis le KIN ────────────────────────────────────
function _kinRGB(colorStr) {
    if (!colorStr) return [0, 255, 204];
    return [parseInt(colorStr.slice(1,3),16), parseInt(colorStr.slice(3,5),16), parseInt(colorStr.slice(5,7),16)];
}
const [CR, CG, CB] = KIN_B ? _kinRGB(KIN_B.color) : [0, 255, 204];

// ── Maillage Icosaèdre (Goldberg subdivision) ─────────────────────────────
function buildIcosahedronMesh() {
    const phi = 1.6180339;
    [[-1,phi,0],[1,phi,0],[-1,-phi,0],[1,-phi,0],[0,-1,phi],[0,1,phi],
     [0,-1,-phi],[0,1,-phi],[phi,0,-1],[phi,0,1],[-phi,0,-1],[-phi,0,1]
    ].forEach(v => {
        const mag = Math.hypot(...v);
        meshVertices.push({ x: v[0]/mag, y: v[1]/mag, z: v[2]/mag, type: 'pentagon' });
    });
    const edges = [];
    for (let i = 0; i < 12; i++)
        for (let j = i+1; j < 12; j++) {
            const a = meshVertices[i], b = meshVertices[j];
            if (Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z) < 1.1) edges.push([i,j]);
        }
    edges.forEach(([a,b]) => {
        const v1 = meshVertices[a], v2 = meshVertices[b];
        const mx = (v1.x+v2.x)/2, my = (v1.y+v2.y)/2, mz = (v1.z+v2.z)/2;
        const mag = Math.hypot(mx,my,mz);
        const idx = meshVertices.length;
        meshVertices.push({ x: mx/mag, y: my/mag, z: mz/mag, type: 'hexagon' });
        meshEdges.push([a,idx],[b,idx]);
    });
    _projBuffer = meshVertices.map(() => ({ x:0, y:0, z:0, type:'' }));
}

// ── Texture Terre procédurale (Mercator 512×256) ──────────────────────────
function _buildEarthTexture() {
    const TW = 512, TH = 256;
    const t = createGraphics(TW, TH);

    // Fond océan (gradient lat)
    t.noStroke();
    for (let y = 0; y <= TH; y++) {
        const lat = 90 - (y/TH)*180;
        const d = Math.abs(lat)/90;
        t.fill(8 + d*4, 38 + d*10, 100 - d*25);
        t.rect(0, y, TW, 1);
    }

    // Helper : dessine un "blob" de continent en Mercator
    function blob(lonC, latC, dLon, dLat, col, alpha) {
        const ux = ((lonC + 180)/360) * TW;
        const uy = ((90 - latC)/180) * TH;
        t.fill(col[0], col[1], col[2], alpha !== undefined ? alpha : 230);
        t.ellipse(ux, uy, (dLon/360)*TW*2, (dLat/180)*TH*2);
        // Reflet anti-seam (wrapping à ±180°)
        if (ux < TW*0.15) t.ellipse(ux + TW, uy, (dLon/360)*TW*2, (dLat/180)*TH*2);
        if (ux > TW*0.85) t.ellipse(ux - TW, uy, (dLon/360)*TW*2, (dLat/180)*TH*2);
    }

    const FOREST = [38, 88, 42];
    const GRASS  = [58, 110, 55];
    const DESERT = [148, 112, 70];
    const TUNDRA = [80, 95, 72];
    const ICE    = [210, 228, 248];

    // Amériques
    blob(-100, 58, 26, 20, FOREST);      // Canada / Alaska
    blob(-88,  38, 18, 16, GRASS);       // USA
    blob(-118, 36, 12, 10, DESERT);      // Great Basin / SW
    blob(-82,  20, 10, 8,  FOREST);      // Mexique / Centram.
    blob(-58,  2,  14, 22, FOREST);      // Amazonie
    blob(-55, -25, 12, 14, GRASS);       // Argentine / Uruguay
    blob(-68, -18, 8,  8,  DESERT, 200); // Andes desert

    // Europe
    blob(15, 52, 14, 10, GRASS);         // Europe centrale
    blob(26, 60, 10, 8,  FOREST);        // Russie occid./Scand.
    blob(-3, 54, 4,  4,  GRASS);         // Iles Brit.
    blob(25, 43, 10, 8,  DESERT, 180);   // Méditerranée

    // Afrique
    blob(20, 12, 24, 22, DESERT);        // Sahara
    blob(18, -8, 20, 22, FOREST);        // Afrique centrale
    blob(28,-25, 12, 10, GRASS);         // Afrique du Sud
    blob(40, 8,  8,  12, DESERT, 180);   // Corne de l'Afrique

    // Moyen-Orient / Arabie
    blob(45, 24, 10, 8,  DESERT);
    blob(60, 30, 8,  8,  DESERT, 190);

    // Asie du Sud
    blob(80, 22, 10, 12, GRASS);         // Inde
    blob(85, 30, 6,  5,  ICE, 200);      // Himalaya/Tibet

    // Asie centrale / Russie
    blob(95, 58, 45, 18, TUNDRA);        // Sibérie
    blob(55, 48, 14, 10, GRASS);         // Kazakh.

    // Chine / Asie Est
    blob(105, 38, 18, 14, GRASS);        // Chine
    blob(110, 18, 14, 12, FOREST);       // SE Asie
    blob(102, 5,  8,  8,  FOREST);       // Malaisie/Sumatra

    // Japon
    blob(135, 37, 2, 5, GRASS);

    // Australie
    blob(133,-25, 18, 14, DESERT);
    blob(148,-35, 8,  6,  GRASS);        // Côte est

    // Nouvelle-Zélande
    blob(170,-42, 2, 4, GRASS, 200);

    // Groenland
    blob(-42, 74, 16, 10, ICE);

    // Calotte Arctique
    t.fill(ICE[0], ICE[1], ICE[2]);
    t.ellipse(TW/2, 0, TW * 0.42, TH * 0.2);

    // Antarctique
    t.ellipse(TW/2, TH, TW * 0.55, TH * 0.22);

    // Léger voile de nuages atmosphériques
    t.noFill();
    for (let i = 0; i < 12; i++) {
        const cx2 = Math.sin(i*1.1)*TW*0.4 + TW/2;
        const cy2 = Math.cos(i*0.9)*TH*0.35 + TH/2;
        t.stroke(255, 255, 255, 12 + i*2);
        t.strokeWeight(12 + i*3);
        t.ellipse(cx2, cy2, 80 + i*20, 22 + i*4);
    }
    t.noStroke();
    return t;
}

// ── Bloom via drawingContext ───────────────────────────────────────────────
function setGlow(c, b) { drawingContext.shadowBlur = b; drawingContext.shadowColor = c; }
function clearGlow()   { drawingContext.shadowBlur = 0; }

// ── Projection GPS → écran P2D ────────────────────────────────────────────
function projectGPS(lat, lon, rotX, rotY, R, cx, cy) {
    const phi = lat*(Math.PI/180), theta = lon*(Math.PI/180);
    let x = Math.cos(phi)*Math.sin(theta);
    let y = Math.sin(phi);
    let z = Math.cos(phi)*Math.cos(theta);
    const x2 = x*Math.cos(rotY) - z*Math.sin(rotY);
    const z2 = x*Math.sin(rotY) + z*Math.cos(rotY);
    const y3 = y*Math.cos(rotX) - z2*Math.sin(rotX);
    const z3 = y*Math.sin(rotX) + z2*Math.cos(rotX);
    return { x: cx + x2*R, y: cy - y3*R, z: z3 };
}

// ── P5.JS ─────────────────────────────────────────────────────────────────
function setup() {
    const c = document.getElementById('canvas-container');
    createCanvas(c.offsetWidth, c.offsetHeight).parent('canvas-container');
    buildIcosahedronMesh();
    _earthTex = _buildEarthTexture();
    _earthGL  = createGraphics(c.offsetWidth, c.offsetHeight, WEBGL);
    // Afficher le KIN si disponible
    if (KIN_B) {
        const p = document.getElementById('kin-panel');
        p.style.display = 'block';
        p.innerHTML = `<div style="color:#${KIN_B.color.slice(1)};font-weight:700">${KIN_B.glyph} · KIN ${KIN_B.kin}</div>
                       <div>Signe ${KIN_B.sign}</div>
                       <div>Ton ${KIN_B.tone}</div>
                       <div style="opacity:.5;font-size:9px;margin-top:4px">${LAT_B.toFixed(2)}°N ${LON_B.toFixed(2)}°E</div>`;
    }
}

function windowResized() {
    const c = document.getElementById('canvas-container');
    resizeCanvas(c.offsetWidth, c.offsetHeight);
    if (_earthGL) _earthGL.resizeCanvas(c.offsetWidth, c.offsetHeight);
}

function draw() {
    if (!_animRunning) return;
    frameTime++;

    // Caméra orbitale : respiration douce autour du lieu de naissance
    _targetRotX = -LAT_B*(Math.PI/180) + Math.sin(frameTime*0.010)*0.14;
    _targetRotY = -LON_B*(Math.PI/180) + Math.sin(frameTime*0.007)*0.18;
    _camRotX += (_targetRotX - _camRotX)*0.04;
    _camRotY += (_targetRotY - _camRotY)*0.04;

    const cx = width/2, cy = height/2;
    const R  = min(width, height)*0.38;

    if (_showEarth) {
        _drawEarthLayer(R);
        // Filament de traîne léger
        blendMode(BLEND); noStroke(); fill(0, 0, 0, 12); rect(0,0,width,height);
    } else {
        blendMode(BLEND); noStroke(); fill(8,6,2,40); rect(0,0,width,height);
    }

    blendMode(ADD);
    _drawGoldberg(cx, cy, R, _showEarth ? 20 : 55);
    _drawAtoms(cx, cy, R);
    _drawSpiral(cx, cy, R);
    blendMode(BLEND);

    // HUD
    const pf = Math.round(frameRate());
    document.getElementById('hud').innerHTML =
        (_showEarth ? '🌍 Mode Terre' : '◯ Mode Goldberg')
        + ` · ${pf} fps<br>Ψ ${(COH*100).toFixed(0)}%`
        + `<br>B: ${LAT_B.toFixed(2)}°N ${LON_B.toFixed(2)}°E`;
}

// ── Couche Earth (WebGL) ──────────────────────────────────────────────────
function _drawEarthLayer(R) {
    _earthGL.clear();
    _earthGL.push();
    // Éclairage directionnel (simuler le soleil depuis haut-gauche)
    _earthGL.ambientLight(40, 40, 40);
    _earthGL.directionalLight(255, 245, 230, -0.5, -0.8, -1);
    // Alignement : PI/2 - camRotY corrige le décalage de texture p5.js sphere
    _earthGL.rotateX(_camRotX);
    _earthGL.rotateY(Math.PI/2 - _camRotY);
    _earthGL.noStroke();
    // Sphère terrestre texturée
    _earthGL.texture(_earthTex);
    _earthGL.shininess(8);
    _earthGL.sphere(R, 72, 48);
    // Halo atmosphérique (sphère légèrement plus grande, bleu translucide)
    _earthGL.noLights();
    _earthGL.fill(30, 80, 200, 18);
    _earthGL.sphere(R*1.025, 32, 24);
    _earthGL.pop();
    // Composite sur le canvas P2D
    blendMode(BLEND); image(_earthGL, 0, 0, width, height);
}

// ── Maillage Goldberg (P2D) ───────────────────────────────────────────────
function _drawGoldberg(cx, cy, R, meshAlpha) {
    for (let i = 0; i < meshVertices.length; i++) {
        const v  = meshVertices[i];
        const y1 = v.y*Math.cos(_camRotX) - v.z*Math.sin(_camRotX);
        const z1 = v.y*Math.sin(_camRotX) + v.z*Math.cos(_camRotX);
        const x2 = v.x*Math.cos(_camRotY) + z1*Math.sin(_camRotY);
        const z2 = -v.x*Math.sin(_camRotY) + z1*Math.cos(_camRotY);
        const p  = _projBuffer[i];
        p.x = cx + x2*R; p.y = cy + y1*R; p.z = z2; p.type = v.type;
    }
    stroke(CR, CG, CB, meshAlpha); strokeWeight(0.8);
    for (let i = 0; i < meshEdges.length; i++) {
        const [a,b] = meshEdges[i];
        if (_projBuffer[a].z > 0 && _projBuffer[b].z > 0)
            line(_projBuffer[a].x, _projBuffer[a].y, _projBuffer[b].x, _projBuffer[b].y);
    }
    // Pentagones (nœuds)
    for (let i = 0; i < _projBuffer.length; i++) {
        const p = _projBuffer[i];
        if (p.type !== 'pentagon') continue;
        stroke(CR, CG, CB, p.z > 0 ? meshAlpha*0.5 : meshAlpha*1.5);
        strokeWeight(p.z > 0 ? 2 : 3.5);
        point(p.x, p.y);
    }
}

// ── Atomes B et C ─────────────────────────────────────────────────────────
function _drawAtoms(cx, cy, R) {
    const ptB = projectGPS(LAT_B, LON_B, _camRotX, _camRotY, R, cx, cy);
    const ptC = projectGPS(LAT_C, LON_C, _camRotX, _camRotY, R, cx, cy);
    const cDiff = (LAT_C !== LAT_B || LON_C !== LON_B);

    // Ligne de connexion subtile vers centre
    if (ptB.z > 0) {
        stroke(CR, CG, CB, 45); strokeWeight(0.7); line(cx, cy, ptB.x, ptB.y);
    }
    if (ptC.z > 0 && cDiff) {
        stroke(CR*0.4, CG*0.4, CB*0.4+120, 35); strokeWeight(0.7); line(cx, cy, ptC.x, ptC.y);
    }

    // Atome B — naissance
    if (ptB.z > 0) {
        setGlow(`rgb(${CR},${CG},${CB})`, 20);
        stroke(CR, CG, CB, 240); strokeWeight(10); point(ptB.x, ptB.y);
        clearGlow();
        stroke(CR, CG, CB, 80); strokeWeight(1);
        noFill(); ellipse(ptB.x, ptB.y, 22, 22);
    }

    // Atome C — conception
    if (ptC.z > 0 && cDiff) {
        setGlow(`rgba(120,80,255,.9)`, 16);
        stroke(120, 80, 255, 220); strokeWeight(8); point(ptC.x, ptC.y);
        clearGlow();
        stroke(120, 80, 255, 60); strokeWeight(0.8);
        noFill(); ellipse(ptC.x, ptC.y, 18, 18);
    }

    // Flux de fusion : particules B→centre et C→centre
    const N = 8;
    noStroke();
    for (let i = 0; i < N; i++) {
        const tB = ((frameTime*0.011 + i/N) % 1);
        if (ptB.z > 0) {
            fill(CR, CG, CB, Math.sin(tB*Math.PI)*140);
            ellipse(ptB.x + (cx-ptB.x)*tB, ptB.y + (cy-ptB.y)*tB, (1-tB)*5+1, (1-tB)*5+1);
        }
        if (ptC.z > 0 && cDiff) {
            const tC = ((frameTime*0.011 + i/N + 0.5) % 1);
            fill(120, 80, 255, Math.sin(tC*Math.PI)*110);
            ellipse(ptC.x + (cx-ptC.x)*tC, ptC.y + (cy-ptC.y)*tC, (1-tC)*4+1, (1-tC)*4+1);
        }
    }
}

// ── Spirale Ψ centrale ────────────────────────────────────────────────────
function _drawSpiral(cx, cy, R) {
    const PHI_S    = 1.6180339887;
    const spiralRot = frameTime*0.018 + PHI_B;
    const grow     = Math.min(1, (frameTime - _spiralBirthFrame)/180);
    const spiralMax = R*(0.08 + 0.22*COH)*grow;
    const STEPS    = 60;

    function arm(rotOffset, r, g, b, alpha, weight) {
        setGlow(`rgb(${r},${g},${b})`, 14 + 18*COH);
        beginShape(); noFill();
        stroke(r, g, b, alpha);
        strokeWeight(weight);
        for (let s = 0; s <= STEPS; s++) {
            const θ = (s/STEPS)*Math.PI*4;
            const rad = 3*Math.pow(PHI_S, θ/(Math.PI/2));
            if (rad > spiralMax) break;
            curveVertex(cx + rad*Math.cos(θ + spiralRot + rotOffset),
                        cy + rad*Math.sin(θ + spiralRot + rotOffset));
        }
        endShape();
        clearGlow();
    }

    arm(0,       CR, CG, CB, 90 + 130*COH, 1.4 + 1.6*COH);
    arm(Math.PI, 120, 80, 255, 70 + 100*COH, 1.0 + 1.2*COH);

    // Noyau Ψ pulsant
    const pulse = 3 + 7*Math.abs(Math.sin(frameTime*0.04 + PHI_B));
    setGlow('rgba(255,240,120,1)', pulse*3);
    noStroke(); fill(255, 240, 120, 220);
    ellipse(cx, cy, pulse*1.5, pulse*1.5);
    clearGlow();
}

// ── Contrôles ─────────────────────────────────────────────────────────────
function _onEarthToggle(checked) {
    _showEarth = checked;
    document.getElementById('lbl-goldberg').classList.toggle('active', !checked);
    document.getElementById('lbl-earth').classList.toggle('active', checked);
}

function _toggleAnim() {
    _animRunning = !_animRunning;
    const btn = document.getElementById('btn-anim');
    if (_animRunning) { loop(); btn.textContent = '⏸ Pause'; }
    else              { noLoop(); btn.textContent = '▶ Reprendre'; }
}

// Visibilité page
document.addEventListener('visibilitychange', () => {
    if (document.hidden) noLoop();
    else if (_animRunning) loop();
});
</script>
</body>
</html>
