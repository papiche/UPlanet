<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💬 Messages — UPlanet</title>
    <link rel="stylesheet" href="core-theme.css">
    <link rel="stylesheet" href="uplanet-atomic.css">
    <link rel="stylesheet" href="a4l-chat-layout.css">
    <style>
/* ── Loading overlay ── */
#loading { position:fixed; inset:0; z-index:2000; background:rgba(8,6,2,.96); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
#loading.hidden { display:none; }
#load-msg { font-size:.78rem; color:rgba(255,255,255,.35); }

/* Mobile : cacher #btn-sb-toggle sur desktop */
@media (min-width:768px) { #btn-sb-toggle { display:none !important; } }

/* ── Date separator ── */
.date-sep { display:flex; justify-content:center; padding:8px 0; }
.date-sep-text { font-size:.66rem; color:rgba(255,255,255,.4); background:rgba(255,255,255,.07); border-radius:12px; padding:3px 10px; }

/* ── Messages — WA/TG style ── */
.msg-row { display:flex; align-items:flex-end; margin-bottom:2px; }
.msg-row.me   { flex-direction:row-reverse; padding-right:8px; }
.msg-row.them { flex-direction:row; padding-left:8px; }
.msg-row.group-start { margin-top:10px; }
.msg-av { width:28px; height:28px; border-radius:50%; flex-shrink:0; background:rgba(0,255,204,.1); display:flex; align-items:center; justify-content:center; font-size:.75rem; overflow:hidden; margin-right:6px; visibility:hidden; }
.msg-av img { width:100%; height:100%; object-fit:cover; }
.msg-row.them.group-last .msg-av { visibility:visible; }
.msg-row.me .msg-av { display:none; }
.msg-wrap { display:flex; flex-direction:column; max-width:82%; }
.msg-row.me .msg-wrap   { align-items:flex-end; }
.msg-row.them .msg-wrap { align-items:flex-start; }

/* Bulles */
.msg-bubble { max-width:100%; padding:7px 11px 4px; font-size:.84rem; line-height:1.46; word-break:break-word; position:relative; }
.msg-bubble.me   { background:#1a3d2f; border-radius:14px 14px 4px 14px; color:#e5ffe5; }
.msg-bubble.them { background:#1f2937; border-radius:14px 14px 14px 4px; color:#e8e8e8; }
.msg-bubble.me.group-mid,.msg-bubble.me.group-first     { border-radius:14px; }
.msg-bubble.them.group-mid,.msg-bubble.them.group-first { border-radius:14px; }
.msg-bubble.pending { opacity:.55; }
.msg-bubble.error   { background:rgba(180,30,30,.35) !important; }

/* Meta heure/coches — flottant dans la bulle */
.msg-meta { display:flex; align-items:center; justify-content:flex-end; gap:3px; float:right; margin-left:10px; margin-top:2px; margin-bottom:-1px; font-size:.62rem; color:rgba(255,255,255,.32); line-height:1.2; }
.msg-bubble.me .msg-meta { color:rgba(180,230,200,.5); }
.msg-tick { font-size:.68rem; }
.msg-tick.sent { color:rgba(0,255,204,.65); }
.msg-ttl-badge { font-size:.58rem; color:rgba(255,180,50,.6); margin-right:3px; }

/* Markdown dans les bulles */
.msg-bubble p  { margin:0 0 6px; }
.msg-bubble p:last-child { margin-bottom:0; }
.msg-bubble ul,.msg-bubble ol { margin:4px 0 6px 16px; padding:0; }
.msg-bubble li { margin-bottom:2px; }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-size:.88rem; font-weight:700; margin:6px 0 3px; color:#fff; }
.msg-bubble strong { color:#fff; font-weight:700; }
.msg-bubble em { opacity:.8; }
.msg-bubble code { background:rgba(0,255,204,.1); border:1px solid rgba(0,255,204,.2); border-radius:4px; padding:1px 5px; font-size:.78rem; font-family:monospace; color:#00ffcc; }
.msg-bubble pre { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.08); border-radius:7px; padding:8px 10px; overflow-x:auto; margin:5px 0; }
.msg-bubble pre code { background:none; border:none; padding:0; font-size:.74rem; color:#ccc; }
.msg-bubble a { color:#00ffcc; text-decoration:underline; word-break:break-all; }
.msg-bubble a:hover { opacity:.78; }
.msg-bubble blockquote { border-left:3px solid rgba(0,255,204,.4); margin:4px 0; padding:2px 8px; color:rgba(255,255,255,.55); font-style:italic; }
.msg-bubble hr { border:none; border-top:1px solid rgba(255,255,255,.1); margin:6px 0; }

/* Image bubble */
.img-bubble { max-width:220px; min-width:100px; border-radius:10px; overflow:hidden; cursor:pointer; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); }
.img-bubble img { width:100%; display:block; max-height:260px; object-fit:cover; border-radius:10px; }
.img-loading { padding:22px 14px; text-align:center; font-size:.71rem; color:rgba(255,255,255,.32); display:flex; flex-direction:column; align-items:center; gap:6px; }
.img-error { padding:10px 12px; font-size:.71rem; color:rgba(255,80,80,.55); text-align:center; }

/* Lightbox */
#lightbox { position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,.92); display:none; align-items:center; justify-content:center; cursor:pointer; }
#lightbox.open { display:flex; }
#lbx-img { max-width:96vw; max-height:92vh; object-fit:contain; border-radius:6px; pointer-events:none; }
#lbx-close { position:fixed; top:14px; right:16px; font-size:1.6rem; color:rgba(255,255,255,.6); cursor:pointer; z-index:1; }

/* Relay picker */
#relay-list { flex:1; overflow-y:auto; }
.r-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; transition:background .12s; border-bottom:1px solid rgba(255,255,255,.03); }
.r-item:hover { background:rgba(0,255,204,.04); }
.r-item.current { background:rgba(0,255,204,.08); }
.r-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,.2); }
.r-dot.green { background:#00e676; } .r-dot.yellow { background:#ffab40; } .r-dot.red { background:#ff5252; }
.r-url { flex:1; font-size:.78rem; color:#e0e0e0; word-break:break-all; }
.r-cur-tag { font-size:.62rem; color:rgba(0,255,204,.7); background:rgba(0,255,204,.1); padding:1px 6px; border-radius:8px; flex-shrink:0; }
#relay-custom { padding:12px 16px 4px; display:flex; flex-direction:column; gap:6px; }
#relay-custom-inp { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:#e0e0e0; padding:8px 12px; font-size:.78rem; font-family:system-ui,sans-serif; outline:none; }
#relay-custom-inp:focus { border-color:rgba(0,255,204,.35); }
#relay-custom-btn { align-self:flex-end; padding:7px 16px; border-radius:8px; background:rgba(0,255,204,.1); border:1px solid rgba(0,255,204,.3); color:#00ffcc; cursor:pointer; font-size:.78rem; font-weight:700; }

/* Enc badge */
.enc-badge { font-size:.58rem; color:rgba(0,255,204,.55); background:rgba(0,255,204,.07); border:1px solid rgba(0,255,204,.18); border-radius:8px; padding:1px 5px; margin-left:4px; vertical-align:middle; }

/* Empty state dans les threads */
.empty-state { display:flex; flex-direction:column; align-items:center; padding:60px 20px; gap:10px; text-align:center; }
.empty-icon { font-size:2.8rem; }
.empty-txt  { color:rgba(255,255,255,.28); font-size:.83rem; }

/* Emoji panel internals */
#emoji-cats { display:flex; overflow-x:auto; gap:2px; padding:6px 8px 4px; border-bottom:1px solid rgba(255,255,255,.06); scrollbar-width:none; }
#emoji-cats::-webkit-scrollbar { display:none; }
.ecat { font-size:1.1rem; padding:4px 7px; border:none; background:none; cursor:pointer; border-radius:6px; flex-shrink:0; transition:background .1s; }
.ecat.active { background:rgba(0,255,204,.15); }
.ecat:hover  { background:rgba(255,255,255,.07); }
#emoji-grid { flex:1; overflow-y:auto; display:flex; flex-wrap:wrap; padding:5px 7px; gap:1px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent; }
.emj { font-size:1.45rem; padding:4px 5px; border:none; background:none; cursor:pointer; border-radius:4px; line-height:1; transition:background .1s; }
.emj:hover { background:rgba(255,255,255,.1); }
    </style>
</head>
<body>

<!-- Overlay de chargement -->
<div id="loading">
    <div class="a4l-spinner"></div>
    <div id="load-msg">Connexion au relay…</div>
</div>

<!-- ══════════════════════════════════════════════
     Shell WA/TG : sidebar + main
     ══════════════════════════════════════════════ -->
<div id="app">

    <!-- Sidebar gauche (conversations + profil) — peuplée par ChatSidebar.init() -->
    <aside id="sidebar"></aside>

    <!-- Overlay mobile pour fermer la sidebar -->
    <div id="sidebar-overlay"></div>

    <!-- Zone principale de chat -->
    <main id="main">

        <!-- En-tête conversation (pair + actions) -->
        <div id="chat-header">
            <!-- Bouton retour (mobile seulement) -->
            <button class="sb-icon-btn" id="btn-back-mobile" onclick="_back()">←</button>
            <!-- Avatar pair -->
            <div id="chat-peer-av">💬</div>
            <!-- Infos pair -->
            <div id="chat-peer-info">
                <div id="chat-peer-name">–</div>
                <div id="chat-peer-sub" style="font-size:.64rem;color:rgba(255,255,255,.3);margin-top:1px"></div>
            </div>
        </div>

        <!-- État vide (aucune conversation sélectionnée) -->
        <div id="no-chat">
            <div id="no-chat-icon">💬</div>
            <div id="no-chat-title">Sélectionnez une conversation</div>
            <div id="no-chat-sub">ou démarrez un nouveau DM →</div>
        </div>

        <!-- Thread de messages -->
        <div id="view-chat"></div>

        <!-- Upload progress -->
        <div id="upload-progress">
            <span id="up-label">Chiffrement…</span>
            <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
            <span id="up-pct">0%</span>
        </div>

        <!-- Emoji panel -->
        <div id="emoji-panel">
            <div id="emoji-cats"></div>
            <div id="emoji-grid"></div>
        </div>

        <!-- Input bar -->
        <div id="input-bar">
            <button class="ib-btn" id="btn-attach" onclick="_attachFile()" title="Joindre une image">📎</button>
            <input type="file" id="file-inp" accept="image/*,video/*" style="display:none" onchange="_onFileChosen(this)">
            <div id="input-row">
                <textarea id="chat-input" placeholder="Message…" rows="1"
                          oninput="_autoRes(this)"
                          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();_send();}"></textarea>
                <button class="ib-btn" id="btn-ttl" onclick="_cycleTTL()" title="Message éphémère">⏳<span class="ttl-label" id="ttl-label"></span></button>
                <button class="ib-btn" id="btn-emoji" onclick="_toggleEmoji()" title="Émojis">😊</button>
            </div>
            <button id="btn-send" onclick="_send()">↑</button>
        </div>

    </main>
</div>

<!-- ── Lightbox ── -->
<div id="lightbox" onclick="_closeLightbox()">
    <span id="lbx-close">✕</span>
    <img id="lbx-img" src="" alt="">
</div>

<!-- ── New DM — bottom sheet CSS-only ── -->
<div class="a4l-sheet-wrap" id="new-dm-sheet-wrap" onclick="_closeNewDm(event)">
    <div class="a4l-bottom-sheet" onclick="event.stopPropagation()">
        <div class="a4l-sheet-body">
            <div class="sheet-handle"></div>
            <div class="sheet-title">💬 Nouveau message</div>
            <div style="padding:12px 16px 4px">
                <div style="font-size:.7rem;color:rgba(255,255,255,.28);margin-bottom:8px">npub1… ou hex pubkey du destinataire</div>
                <input class="a4l-input" id="new-dm-inp" placeholder="npub1… ou 64 hex" autocomplete="off">
                <div id="new-dm-err" style="font-size:.7rem;color:rgba(255,90,90,.7);min-height:.9rem;margin-top:4px"></div>
                <div style="display:flex;gap:8px;margin-top:10px">
                    <button onclick="_startNewDm()" class="h-btn h-btn-teal" style="flex:1;padding:9px">Ouvrir</button>
                    <button onclick="_closeNewDm()" class="h-btn h-btn-dim" style="padding:9px 14px">Annuler</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── Relay picker — bottom sheet CSS-only ── -->
<div class="a4l-sheet-wrap" id="relay-sheet-wrap" onclick="_closeRelayPicker(event)">
    <div class="a4l-bottom-sheet" onclick="event.stopPropagation()">
        <div class="a4l-sheet-body">
            <div class="sheet-handle"></div>
            <div class="sheet-title">⬡ Relay de messagerie</div>
            <div id="relay-list"></div>
            <div id="relay-custom">
                <input class="a4l-input" id="relay-custom-inp" placeholder="wss://relay.exemple.com"
                       autocomplete="off" style="margin:0"
                       onkeydown="if(event.key==='Enter') _connectCustomRelay()">
                <button id="relay-custom-btn" onclick="_connectCustomRelay()">⚡ Connecter</button>
            </div>
        </div>
    </div>
</div>

<script src="marked.min.js"></script>
<script>
// Configurer marked — liens toujours target=_blank rel=noopener
if (typeof marked !== 'undefined') {
    var _markedRenderer = new marked.Renderer();
    _markedRenderer.link = function(href, title, text) {
        return '<a href="'+href+'" target="_blank" rel="noopener"'+(title?' title="'+title+'"':'')+'>'+text+'</a>';
    };
    marked.setOptions({ renderer: _markedRenderer, breaks: true, gfm: true, mangle: false, headerIds: false });
}
</script>
<script src="nostr.bundle.js"></script>
<script src="atomic-profile-db.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
var _myPub       = null;
var _peer        = null;
var _peerProf    = null;
var _msgs        = [];
var _convItems   = [];     // sorted array for rendering
var _profCache   = {};
var _imgCache    = {};     // msgId → blobUrl
var _decryptCache = {};    // ev.id → decrypted plaintext (in-memory, session lifetime)
var _liveWs     = null;
var _liveSub    = null;
var _encMode    = null;
var _constellRelays = [];

// ── Éphémère (NIP-40) ─────────────────────────────────────────────────────────
var _ttl = 0;   // 0 = permanent, 300 = 5min, 3600 = 1h, 86400 = 24h
var _TTL_STEPS = [0, 300, 3600, 86400];
var _TTL_LABELS = { 0: '', 300: '5min', 3600: '1h', 86400: '24h' };

function _cycleTTL() {
    var idx = _TTL_STEPS.indexOf(_ttl);
    _ttl = _TTL_STEPS[(idx + 1) % _TTL_STEPS.length];
    var btn    = document.getElementById('btn-ttl');
    var lbl    = document.getElementById('ttl-label');
    var send   = document.getElementById('btn-send');
    var irow   = document.getElementById('input-row');
    if (!btn) return;
    if (_ttl > 0) {
        btn.classList.add('active');
        if (lbl)  lbl.textContent  = _TTL_LABELS[_ttl];
        /* Glow ambre sur le bouton envoi — l'utilisateur voit que c'est éphémère */
        if (send) send.classList.add('ephemeral');
        if (irow) irow.classList.add('ephemeral');
        if (send) send.title = 'Envoyer (éphémère ' + _TTL_LABELS[_ttl] + ')';
    } else {
        btn.classList.remove('active');
        if (lbl)  lbl.textContent  = '';
        if (send) { send.classList.remove('ephemeral'); send.title = ''; }
        if (irow) irow.classList.remove('ephemeral');
    }
}

function _fmtTTL(secs) {
    if (!secs) return '';
    if (secs < 3600) return Math.round(secs/60)+'m';
    if (secs < 86400) return Math.round(secs/3600)+'h';
    return Math.round(secs/86400)+'j';
}

  '✅':['✅','❌','⭕','❓','❗','💯','🔴','🟠','🟡','🟢','🔵','🟣','⚫','⚪','🟤','⬆️','➡️','⬇️','⬅️','↩️','↪️','🔄','♻️','✨','🔥','💧','🌊','⚡','🌈','💫','🎵','🎶','💬','💭','🗯️','👁️','🔊','🔔','📢','⚜️','✳️','❇️','✴️','🆕','🆙','🆗','🆒','🆓','🆘']

var _emojiActive = '⭐';

// ── URL helpers ───────────────────────────────────────────────────────────────
var _activeRelay = (function() {
    var h = location.hostname;
    if (h === '127.0.0.1' || h === 'localhost') return 'ws://127.0.0.1:7777';
    if (h.startsWith('ipfs.')) return 'wss://relay.' + h.slice(5);
    if (h.startsWith('u.'))    return 'wss://relay.' + h.slice(2);
    return 'wss://relay.copylaradio.com';
})();

function _relay() { return _activeRelay; }

function _upassportUrl() {
    if (typeof getUSPOTUrl === 'function') return getUSPOTUrl();
    if (typeof window.upassportUrl !== 'undefined') return window.upassportUrl;
    var h = location.hostname;
    if (h === '127.0.0.1' || h === 'localhost') return 'http://127.0.0.1:54321';
    if (h.startsWith('ipfs.')) return 'http://u.' + h.slice(5) + ':54321';
    if (h.startsWith('u.'))    return 'http://' + h + ':54321';
    return 'http://127.0.0.1:54321';
}

function _ipfsGw() {
    var h = location.hostname;
    if (h === '127.0.0.1' || h === 'localhost') return 'http://127.0.0.1:8080/ipfs/';
    return 'http://' + h + ':8080/ipfs/';
}

function _relayShort() {
    try {
        var host = new URL(_activeRelay).hostname;
        return host.replace(/^relay\./, '').replace(/^wss?:\/\//, '');
    } catch(_) { return _activeRelay.replace(/wss?:\/\//, '').slice(0,18); }
}

// ── WebSocket query ───────────────────────────────────────────────────────────
function _query(filter, ms) {
    return new Promise(function(resolve) {
        var evs = [], ws, done = function() {
            try { ws && ws.readyState < 2 && ws.close(); } catch(_) {}
            resolve(evs);
        };
        var t = setTimeout(done, ms || 8000);
        try {
            ws = new WebSocket(_relay());
            var sub = 'q' + Math.random().toString(36).slice(2,6);
            ws.onopen    = function() { ws.send(JSON.stringify(['REQ', sub, filter])); };
            ws.onmessage = function(e) {
                try {
                    var m = JSON.parse(e.data);
                    if (m[0]==='EVENT' && m[1]===sub) evs.push(m[2]);
                    else if (m[0]==='EOSE') { clearTimeout(t); done(); }
                } catch(_) {}
            };
            ws.onerror = ws.onclose = function() { clearTimeout(t); resolve(evs); };
        } catch(_) { clearTimeout(t); resolve([]); }
    });
}

function _publish(signed) {
    return new Promise(function(resolve, reject) {
        var ws = new WebSocket(_relay());
        var t  = setTimeout(function() { ws.close(); reject(new Error('timeout')); }, 6000);
        ws.onopen    = function() { ws.send(JSON.stringify(['EVENT', signed])); };
        ws.onmessage = function(e) {
            try {
                var m = JSON.parse(e.data);
                if (m[0]==='OK') { clearTimeout(t); ws.close(); resolve(m); }
            } catch(_) {}
        };
        ws.onerror = function() { clearTimeout(t); reject(new Error('relay error')); };
        ws.onclose = function() { clearTimeout(t); resolve(null); };
    });
}

// ── Encryption ────────────────────────────────────────────────────────────────
function _detectEnc() {
    if (window.nostr && window.nostr.nip44 && typeof window.nostr.nip44.encrypt === 'function')
        _encMode = 'nip44';
    else if (window.nostr && window.nostr.nip04 && typeof window.nostr.nip04.encrypt === 'function')
        _encMode = 'nip04';
    else if (window.nostr && typeof window.nostr.encrypt === 'function')
        _encMode = 'nip04-legacy';
    else
        _encMode = null;
}

async function _encrypt(pub, text) {
    _detectEnc();
    if (_encMode === 'nip44') return window.nostr.nip44.encrypt(pub, text);
    if (_encMode === 'nip04') return window.nostr.nip04.encrypt(pub, text);
    if (_encMode === 'nip04-legacy') return window.nostr.encrypt(pub, text);
    throw new Error('Extension NOSTR requise (Alby, nos2x, Flamingo…)');
}

// nos2x-fox returns {error:{...}} instead of throwing — check for string result
async function _tryDecrypt(fn) {
    try {
        var r = await fn();
        // Extension error objects returned instead of thrown
        if (r && typeof r === 'object' && r.error) return null;
        if (typeof r === 'string') return r;
    } catch(_) {}
    return null;
}

async function _decrypt(ev) {
    var peerPub = ev.pubkey === _myPub
        ? ((ev.tags||[]).find(function(t){return t[0]==='p';})||[])[1]
        : ev.pubkey;
    if (!peerPub) return '[erreur: destinataire manquant]';
    var content = ev.content;
    // NIP-04 format detection: base64?iv=base64
    var isNip04Fmt = content.indexOf('?iv=') !== -1;

    // NIP-44 (only when not obviously NIP-04 format)
    if (!isNip04Fmt && window.nostr && window.nostr.nip44 && window.nostr.nip44.decrypt) {
        var r44 = await _tryDecrypt(function() { return window.nostr.nip44.decrypt(peerPub, content); });
        if (r44 !== null) return r44;
    }
    // NIP-04 via nip04 namespace (nos2x-fox, Alby ≥ 2024)
    if (window.nostr && window.nostr.nip04 && window.nostr.nip04.decrypt) {
        var r04 = await _tryDecrypt(function() { return window.nostr.nip04.decrypt(peerPub, content); });
        if (r04 !== null) return r04;
    }
    // NIP-04 legacy (direct window.nostr.decrypt)
    if (window.nostr && typeof window.nostr.decrypt === 'function') {
        var r04l = await _tryDecrypt(function() { return window.nostr.decrypt(peerPub, content); });
        if (r04l !== null) return r04l;
    }
    return '🔒 [chiffré — extension NIP-44/04 requise]';
}

// ── Decrypt cache — évite de solliciter l'extension pour des messages déjà vus ─
async function _cachedDecrypt(ev) {
    if (_decryptCache[ev.id] !== undefined) return _decryptCache[ev.id];
    var text = await _decrypt(ev);
    // Ne pas cacher les erreurs transitoires (extension indisponible, destinataire absent)
    if (text !== '[erreur: destinataire manquant]' &&
        text !== '🔒 [chiffré — extension NIP-44/04 requise]') {
        _decryptCache[ev.id] = text;
    }
    return text;
}

// ── Profile cache (mémoire → IndexedDB → NOSTR) ───────────────────────────────
async function _profile(hex) {
    if (_profCache[hex]) return _profCache[hex];
    if (window.A4LProfileDB) {
        var cached = await window.A4LProfileDB.get(hex);
        if (cached) { _profCache[hex] = cached; return cached; }
    }
    var evs = await _query({kinds:[0], authors:[hex], limit:1}, 4000);
    if (evs.length) {
        try {
            var p = JSON.parse(evs[0].content);
            _profCache[hex] = {name: p.display_name||p.name||(hex.slice(0,8)+'…'), picture: p.picture||null};
        } catch(_) {}
    }
    if (!_profCache[hex]) _profCache[hex] = {name: hex.slice(0,8)+'…', picture:null};
    if (window.A4LProfileDB) window.A4LProfileDB.set(hex, _profCache[hex]);
    return _profCache[hex];
}

// ── Conversation list ──────────────────────────────────────────────────────────
async function _loadConvs() {
    _setMsg('Chargement des messages…');
    var sent = await _query({kinds:[4], authors:[_myPub], limit:300}, 10000);
    var recv = await _query({kinds:[4], '#p':[_myPub],    limit:300}, 10000);
    var byPeer = {};
    function _track(ev, isMe) {
        var peer = isMe ? ((ev.tags||[]).find(function(t){return t[0]==='p';})||[])[1] : ev.pubkey;
        if (!peer || peer===_myPub) return;
        if (!byPeer[peer] || ev.created_at > byPeer[peer].ev.created_at)
            byPeer[peer] = {ev:ev, isMe:isMe};
    }
    sent.forEach(function(e){_track(e,true);}); recv.forEach(function(e){_track(e,false);});
    var peers = Object.keys(byPeer);
    if (!peers.length) { _renderEmptyConvs(); _hideLoad(); _showBtn(); return; }
    _setMsg('Déchiffrement des aperçus…');
    var items = await Promise.all(peers.map(async function(p) {
        var entry = byPeer[p];
        var prof  = await _profile(p);
        var text  = await _cachedDecrypt(entry.ev);
        return {peer:p, profile:prof, text:text, time:entry.ev.created_at, isMe:entry.isMe};
    }));
    items.sort(function(a,b){return b.time-a.time;});
    _convItems = items;
    _renderConvList(items);
    _hideLoad(); _showBtn();
    _subscribeLive();
}

function _filterConvs(q) {
    if (!q) { _renderConvList(_convItems); return; }
    var lq = q.toLowerCase();
    _renderConvList(_convItems.filter(function(c) {

               c.text.toLowerCase().includes(lq);
    }));
}

function _renderConvList(items) {
    var el = document.getElementById('conv-list');
    if (!items.length) { _renderEmptyConvs(); return; }
    el.innerHTML = items.map(function(c) {
        var av = c.profile.picture
            ? '<img src="'+_esc(c.profile.picture)+'" loading="lazy" onerror="this.parentNode.textContent=\'💬\'">'
            : '💬';
        var preview = (c.isMe ? '✓ ' : '') + _trunc(_previewText(c.text), 50);
        return '<div class="conv-item" onclick="_openChat(\''+c.peer+'\')">' +
            '<div class="conv-av">'+av+'</div>' +
            '<div class="conv-body">' +
                '<div class="conv-top"><span class="conv-name">'+_esc(c.profile.name)+'</span><span class="conv-time">'+_fmt(c.time)+'</span></div>' +
                '<div class="conv-bot"><span class="conv-preview">'+_esc(preview)+'</span></div>' +
            '</div>' +
        '</div>';
    }).join('');
}

function _previewText(text) {

async function _startBroLoveChat() {
    var btn = document.querySelector('#conv-list button');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Recherche du BRO…'; }
    try {
        var stUrl = _upassportUrl().replace(':54321', ':12345').replace('/u.', '/').replace(/\/\/u\./, '//');
        // URL station 12345 : remplace le sous-domaine u. par le domaine direct
        var h = location.hostname;
        if (h.startsWith('ipfs.'))      stUrl = 'http://' + h.slice(5) + ':12345';
        else if (h.startsWith('u.'))    stUrl = 'http://' + h.slice(2) + ':12345';
        else                            stUrl = 'http://' + h + ':12345';

        var resp = await fetch(stUrl + '/12345.json', { signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined });
        var json = await resp.json();
        var nodeHex = json.NODEHEX || json.nodehex || json.ASTROPORT || '';
        if (!nodeHex || !/^[0-9a-f]{64}$/i.test(nodeHex)) throw new Error('NODEHEX introuvable');

        await _openChat(nodeHex.toLowerCase());
        // Pré-remplir le message "LOVE"
        var inp = document.getElementById('chat-input');
        if (inp) { inp.value = 'LOVE'; inp.dispatchEvent(new Event('input')); inp.focus(); }
    } catch(e) {
        console.warn('[A4L chat] _startBroLoveChat:', e);
        if (btn) { btn.disabled = false; btn.textContent = '💌 Demander mon Analyse à BRO'; }
        alert('BRO introuvable : ' + (e.message || String(e)));

}

async function _loadMsgs() {
    if (!_peer || !_myPub) return;
    var [sent, recv] = await Promise.all([
        _query({kinds:[4], authors:[_myPub], '#p':[_peer], limit:100}, 8000),
        _query({kinds:[4], authors:[_peer],  '#p':[_myPub], limit:100}, 8000)
    ]);
    var all = sent.concat(recv);
    var seen = {}; all = all.filter(function(e){if(seen[e.id])return false;seen[e.id]=1;return true;});
    all.sort(function(a,b){return a.created_at-b.created_at;});
    // Déchiffrement par lots de 5 — évite de saturer l'extension NOSTR (nos2x/Alby)
    var BATCH = 5;
    _msgs = [];
    for (var bi = 0; bi < all.length; bi += BATCH) {
        var chunk = all.slice(bi, bi + BATCH);
        var decoded = await Promise.all(chunk.map(async function(ev) {
            var text = await _cachedDecrypt(ev);
            var expTag = (ev.tags || []).find(function(t){return t[0]==='expiration';});
            var ttlRemaining = expTag ? (parseInt(expTag[1],10) - ev.created_at) : 0;
            return {id:ev.id, isMe:ev.pubkey===_myPub, text:text, time:ev.created_at, sent:true, ttl:ttlRemaining>0?ttlRemaining:0};
        }));
        _msgs = _msgs.concat(decoded);
    }
    _renderMsgs();
}

// ── Render messages with date separators ──────────────────────────────────────
function _renderMsgs() {
    var el   = document.getElementById('view-chat');
    var pic  = _peerProf && _peerProf.picture;
    if (!_msgs.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-txt">Démarrez la conversation</div></div>';
        return;
    }
    var html = '';
    var lastDate = '';
    _msgs.forEach(function(m, i) {
        var dateStr = _fmtDate(m.time);
        if (dateStr !== lastDate) {
            html += '<div class="date-sep"><div class="date-sep-text">'+_esc(dateStr)+'</div></div>';
            lastDate = dateStr;
        }
        // Calcul du contexte de groupe (même sender consécutif)
        var prevSame = i > 0 && _msgs[i-1].isMe === m.isMe && _fmtDate(_msgs[i-1].time) === dateStr;
        var nextSame = i < _msgs.length-1 && _msgs[i+1].isMe === m.isMe && _fmtDate(_msgs[i+1].time) === dateStr;
        var grp = prevSame && nextSame ? 'mid' : prevSame ? 'last' : nextSame ? 'first' : 'solo';
        html += _renderMsgRow(m, pic, grp);
    });
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
    _msgs.forEach(function(m) {
        try {
            var j = JSON.parse(m.text);
            if (j._uenc_img) _decryptAndShowImg(m.id, j._uenc_img);
        } catch(_) {}
    });
}

function _renderMd(text) {
    // Utilise marked.js si disponible, sinon linkification simple
    if (typeof marked !== 'undefined') {
        try {
            var raw = marked.parse(text, {
                breaks: true,
                gfm: true,
                mangle: false,
                headerIds: false
            });
            return (typeof sanitizeHtml === 'function') ? sanitizeHtml(raw) : raw;
        } catch(_) {}
    }
    // Fallback : linkification basique + sauts de ligne (déjà échappé via _esc)
    return _esc(text)
        .replace(/https?:\/\/[^\s<>"]+/g, function(u) {
            return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>';
        })
        .replace(/\n/g, '<br>');
}

function _renderMsgRow(m, peerPic, grp) {
    grp = grp || 'solo';
    var side = m.isMe ? 'me' : 'them';
    var cls  = (m.pending ? ' pending' : m.error ? ' error' : '') + ' group-'+grp;
    var isGroupStart = (grp === 'first' || grp === 'solo');
    var isGroupLast  = (grp === 'last'  || grp === 'solo');
    var rowCls = side + (isGroupStart ? ' group-start' : '') + (isGroupLast ? ' group-last' : '');

    // Avatar — visible uniquement pour le dernier message reçu d'un groupe
    var avHtml = '';
    if (!m.isMe) {
        var avContent = peerPic
            ? '<img src="'+_esc(peerPic)+'" loading="lazy" onerror="this.parentNode.textContent=\'💬\'">'
            : '💬';
        avHtml = '<div class="msg-av">'+avContent+'</div>';
    }

    // Coche d'envoi
    var tick = m.isMe
        ? '<span class="msg-tick'+(m.sent?' sent':'')+'">'+( m.pending ? '⌛' : m.error ? '⚠' : '✓' )+'</span>'
        : '';

    // Badge TTL si le message est éphémère
    var ttlBadge = m.ttl ? '<span class="msg-ttl-badge">⏳'+_fmtTTL(m.ttl)+'</span>' : '';

    // Meta — heure + TTL + coche — flottée dans la bulle
    var meta = '<span class="msg-meta">'+ttlBadge+_fmt(m.time)+tick+'</span>';

    var content;
    try {
        var j = JSON.parse(m.text);
        if (j._uenc_img) {
            var cached = _imgCache[m.id];
            content = '<div class="img-bubble" id="ib-'+m.id+'">' + (
                cached
                    ? '<img src="'+cached+'" onclick="_openLightbox(this.src)">'
                    : '<div class="img-loading"><div class="a4l-spinner" style="width:22px;height:22px;border-width:2px"></div>Déchiffrement…</div>'
            ) + '</div>' + meta;
        } else { content = _renderMd(m.text) + meta; }
    } catch(_) { content = _renderMd(m.text) + meta; }

    return '<div class="msg-row '+rowCls+'">' +
        avHtml +
        '<div class="msg-wrap">' +
            '<div class="msg-bubble '+side+cls+'">'+content+'</div>' +
        '</div>' +
    '</div>';
}

// ── Send text ─────────────────────────────────────────────────────────────────
async function _send() {
    if (!_peer || !_myPub) return;
    _detectEnc();
    if (!_encMode) { showNotification({ message: '⚠ Extension NOSTR requise (Alby, nos2x, Flamingo…)', type: 'warning' }); return; }
    var inp  = document.getElementById('chat-input');
    var text = inp.value.trim();
    if (!text) return;
    var btn = document.getElementById('btn-send');
    btn.disabled = true; inp.value = ''; inp.style.height = '';
    // Close emoji panel if open
    document.getElementById('emoji-panel').classList.remove('open');
    var tmpId = 'tmp'+Date.now();
    var curTTL = _ttl;
    _msgs.push({id:tmpId, isMe:true, text:text, time:Math.floor(Date.now()/1000), pending:true, ttl:curTTL});
    _renderMsgs();
    try {
        var cipher = await _encrypt(_peer, text);
        var nowTs  = Math.floor(Date.now()/1000);
        var tags   = [['p', _peer]];
        if (curTTL > 0) tags.push(['expiration', String(nowTs + curTTL)]);
        var evRaw  = {kind:4, content:cipher, tags:tags, created_at:nowTs, pubkey:_myPub};
        var signed = await window.nostr.signEvent(evRaw);
        await _publish(signed);
        var idx = _msgs.findIndex(function(m){return m.id===tmpId;});
        if (idx!==-1) _msgs[idx] = {id:signed.id, isMe:true, text:text, time:signed.created_at, sent:true, ttl:curTTL};
    } catch(e) {
        var idx2 = _msgs.findIndex(function(m){return m.id===tmpId;});
        if (idx2!==-1) _msgs[idx2] = {id:tmpId, isMe:true, text:text+'  ⚠ '+(e.message||'erreur'), time:Math.floor(Date.now()/1000), error:true};
    } finally {
        btn.disabled = false; _renderMsgs();
        _updateConvPreview(_peer, text, true);
    }
}

async function _uploadAndSend(file) {
    if (!_peer || !_myPub) return;
    _detectEnc();
    if (!_encMode) { showNotification({ message: '⚠ Extension NOSTR requise pour chiffrer le message', type: 'warning' }); return; }

    // Random 32-byte AES key
    var keyBytes = new Uint8Array(32);
    crypto.getRandomValues(keyBytes);
    var keyHex = _bytesToHex(keyBytes);

    _showProgress(0, 'Envoi vers UPassport…');
    var fd = new FormData();
    fd.append('encryption_key',  keyHex);
    fd.append('encryption_type', 'aes256gcm');
    fd.append('file', file, file.name);

    try {
        var result = await _xhrUpload(_upassportUrl()+'/api/fileupload/encrypted', fd, function(pct) {
            _showProgress(pct, 'Chiffrement IPFS…');
        });
        _hideProgress();
        if (!result || !result.cid) throw new Error('Réponse invalide du serveur');
        var imgPayload = JSON.stringify({_uenc_img: {
            cid:      result.cid,
            enc_key:  keyHex,
            enc_type: 'aes256gcm',
            iv:       result.iv_hex,
            filename: file.name
        }});
        var tmpId = 'tmp'+Date.now();
        _msgs.push({id:tmpId, isMe:true, text:imgPayload, time:Math.floor(Date.now()/1000), pending:true});
        _renderMsgs();
        var cipher = await _encrypt(_peer, imgPayload);
        var evRaw  = {kind:4, content:cipher, tags:[['p',_peer]], created_at:Math.floor(Date.now()/1000), pubkey:_myPub};
        var signed = await window.nostr.signEvent(evRaw);
        await _publish(signed);
        var idx = _msgs.findIndex(function(m){return m.id===tmpId;});
        if (idx!==-1) _msgs[idx] = {id:signed.id, isMe:true, text:imgPayload, time:signed.created_at, sent:true};
        _renderMsgs();
        _updateConvPreview(_peer, '📷 Image', true);
    } catch(e) {
        _hideProgress();
        showNotification({ message: '⚠ Erreur envoi image : ' + (e.message || e), type: 'error' });
    }
}

function _xhrUpload(url, formData, onProgress) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100));
        };
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                try { resolve(JSON.parse(xhr.responseText)); } catch(_) { reject(new Error('JSON invalide')); }
            } else { reject(new Error('Erreur HTTP '+xhr.status)); }
        };
        xhr.onerror = function() { reject(new Error('Erreur réseau')); };
        xhr.send(formData);
    });
}

// ── UENC image decrypt + display ──────────────────────────────────────────────
async function _decryptAndShowImg(msgId, imgObj) {
    if (_imgCache[msgId]) { _updateImgBubble(msgId, _imgCache[msgId]); return; }
    try {
        var url   = _ipfsGw() + imgObj.cid;
        var resp  = await fetch(url);
        if (!resp.ok) throw new Error('IPFS '+resp.status);
        var buf   = await resp.arrayBuffer();
        var b     = new Uint8Array(buf);
        // UENC: [4 magic][1 ver][1 enc_type][12 IV][ciphertext+tag]
        if (b[0]!==0x55||b[1]!==0x45||b[2]!==0x4E||b[3]!==0x43)
            throw new Error('Magic UENC invalide');
        var iv = b.slice(6, 18);
        var ct = b.slice(18);
        var rawKey = _hexToBytes(imgObj.enc_key);
        var cryptoKey = await crypto.subtle.importKey('raw', rawKey, {name:'AES-GCM'}, false, ['decrypt']);
        var plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv, tagLength:128}, cryptoKey, ct);
        var blob  = new Blob([plain]);
        var burl  = URL.createObjectURL(blob);
        _imgCache[msgId] = burl;
        _updateImgBubble(msgId, burl);
    } catch(e) {
        _updateImgBubbleError(msgId, e.message||'Erreur déchiffrement');
    }
}

function _updateImgBubble(msgId, blobUrl) {
    var el = document.getElementById('ib-'+msgId);
    if (!el) return;
    el.innerHTML = '<img src="'+blobUrl+'" onclick="_openLightbox(this.src)" loading="lazy">';
}
function _updateImgBubbleError(msgId, msg) {
    var el = document.getElementById('ib-'+msgId);
    if (el) el.innerHTML = '<div class="img-error">🔐 '+_esc(msg)+'</div>';
}

// ── Live subscription ──────────────────────────────────────────────────────────
function _subscribeLive() {
    if (_liveWs) {
        _liveWs.onmessage = null;
        _liveWs.onclose   = null;
        _liveWs.onerror   = null;
        if (_liveWs.readyState < 2) _liveWs.close();
    }
    _liveWs = new WebSocket(_relay());
    _liveSub = 'live'+Math.random().toString(36).slice(2,6);
    _liveWs.onopen = function() {
        _updateRelayBadge('connected');
        _liveWs.send(JSON.stringify(['REQ', _liveSub, {
            kinds:[4], '#p':[_myPub],
            since: Math.floor(Date.now()/1000) - 10
        }]));
    };
    _liveWs.onmessage = async function(e) {
        try {
            var m = JSON.parse(e.data);
            if (m[0]!=='EVENT' || m[1]!==_liveSub) return;
            var ev   = m[2];
            if (ev.pubkey === _myPub) return;
            var peer = ev.pubkey;
            var text = await _cachedDecrypt(ev);
            if (!_profCache[peer]) await _profile(peer);
            // Update conv list
            var found = false;
            for (var i=0; i<_convItems.length; i++) {
                if (_convItems[i].peer===peer) {
                    _convItems[i].text = text; _convItems[i].time = ev.created_at; _convItems[i].isMe = false;
                    found = true; break;
                }
            }
            if (!found) _convItems.unshift({peer:peer, profile:_profCache[peer]||{name:peer.slice(0,8)+'…',picture:null}, text:text, time:ev.created_at, isMe:false});
            _convItems.sort(function(a,b){return b.time-a.time;});
            _renderConvList(_convItems);
            if (_peer===peer) {
                if (!_msgs.find(function(msg){return msg.id===ev.id;})) {
                    _msgs.push({id:ev.id, isMe:false, text:text, time:ev.created_at, sent:true});
                    _renderMsgs();
                }
            }
        } catch(_) {}
    };
    _liveWs.onerror = function() { _updateRelayBadge('error'); };
    _liveWs.onclose = function() {
        _updateRelayBadge('');
        setTimeout(function() {
            if (_myPub) _subscribeLive();
        }, 5000);
    };
}

// ── Constellation relay picker ────────────────────────────────────────────────
async function _loadConstellationRelays() {
    var evs = await _query({kinds:[30850], limit:80}, 8000);
    var seen = new Set([_activeRelay]);
    evs.forEach(function(ev) {
        (ev.tags||[]).forEach(function(t) {
            if (t[0]==='relay' && typeof t[1]==='string' && t[1].startsWith('wss://'))
                seen.add(t[1]);
        });
    });
    _constellRelays = Array.from(seen);
}

function _testRelay(url) {
    return new Promise(function(resolve) {
        var ws;
        var t = setTimeout(function() {
            if (ws) { ws.onopen = ws.onerror = ws.onclose = null; try { ws.close(); } catch(_) {} }
            resolve(false);
        }, 3000);
        try {
            ws = new WebSocket(url);
            ws.onopen  = function() { clearTimeout(t); ws.onopen = ws.onerror = null; ws.close(); resolve(true); };
            ws.onerror = function() { clearTimeout(t); ws.onerror = null; resolve(false); };
        } catch(_) { clearTimeout(t); resolve(false); }
    });
}

async function _openRelayPicker() {
    document.getElementById('relay-sheet-wrap').classList.add('open');
    document.getElementById('relay-list').innerHTML =
        '<div style="padding:14px;text-align:center;font-size:.75rem;color:rgba(255,255,255,.3)">Chargement constellation…</div>';
    if (!_constellRelays.length) await _loadConstellationRelays();
    // Test all relays in parallel
    var tests = await Promise.all(_constellRelays.map(function(url) {
        return _testRelay(url).then(function(ok) { return {url:url, ok:ok}; });
    }));
    _renderRelayList(tests);
}

function _renderRelayList(tests) {
    var el = document.getElementById('relay-list');
    if (!tests.length) { el.innerHTML = '<div style="padding:14px;text-align:center;font-size:.75rem;color:rgba(255,255,255,.3)">Aucun relay trouvé</div>'; return; }
    el.innerHTML = tests.map(function(r) {
        var isCurrent = r.url === _activeRelay;
        var dot = r.ok ? 'green' : 'red';
        return '<div class="r-item'+(isCurrent?' current':'')+'" onclick="_switchRelay(\''+_esc(r.url)+'\')">' +
            '<div class="r-dot '+dot+'"></div>' +
            '<div class="r-url">'+_esc(r.url)+'</div>' +
            (isCurrent ? '<div class="r-cur-tag">actuel</div>' : '') +
        '</div>';
    }).join('');
}

function _closeRelayPicker(e) {
    if (e && e.target !== document.getElementById('relay-sheet-wrap')) return;
    document.getElementById('relay-sheet-wrap').classList.remove('open');
}

async function _switchRelay(url) {
    document.getElementById('relay-sheet-wrap').classList.remove('open');
    if (url === _activeRelay) return;
    _activeRelay = url;
    _updateRelayBadge('');
    if (_liveWs) { _liveWs.onclose = null; _liveWs.close(); }
    // Reload
    if (_peer) {
        document.getElementById('view-chat').innerHTML = '<div class="empty-state"><div class="a4l-spinner"></div></div>';
        await _loadMsgs();
    } else {
        document.getElementById('conv-list').innerHTML = '';
        document.getElementById('loading').classList.remove('hidden');
        await _loadConvs();
    }
}

function _connectCustomRelay() {
    var val = (document.getElementById('relay-custom-inp').value||'').trim();
    if (!val.startsWith('wss://') && !val.startsWith('ws://')) {

    }
    if (!_constellRelays.includes(val)) _constellRelays.push(val);
    _switchRelay(val);
}

async function _startNewDm() {
    var val = (document.getElementById('new-dm-inp').value||'').trim();
    var err = document.getElementById('new-dm-err');
    if (!val) { err.textContent = 'Saisissez une clé publique'; return; }
    var hex = val;
    if (val.startsWith('npub1')) {
        try {
            if (typeof NostrTools !== 'undefined' && NostrTools.nip19) {
                var decoded = NostrTools.nip19.decode(val);
                hex = decoded.data;
            } else { err.textContent = 'Conversion npub indisponible'; return; }
        } catch(_) { err.textContent = 'npub invalide'; return; }
    }
    if (!/^[0-9a-f]{64}$/i.test(hex)) { err.textContent = 'Clé invalide (64 hex requis)'; return; }
    _closeNewDm();
    await _openChat(hex.toLowerCase());

// ── Utils ─────────────────────────────────────────────────────────────────────
function _esc(s) {
    return String(s||'').replace(/[<>&"'`]/g, function(c){
        return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;','`':'&#96;'}[c];
    });
}
function _trunc(s,n) { s=s||''; return s.length>n ? s.slice(0,n)+'…' : s; }
function _fmt(unix) {
    var d=new Date(unix*1000), now=new Date();
    var h=d.getHours().toString().padStart(2,'0'), m=d.getMinutes().toString().padStart(2,'0');
    if (d.toDateString()===now.toDateString()) return h+':'+m;
    var diff=(now-d)/86400000;
    var days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    if (diff<7) return days[d.getDay()]+' '+h+':'+m;
    return d.getDate()+'/'+(d.getMonth()+1)+' '+h+':'+m;
}
function _fmtDate(unix) {
    var d=new Date(unix*1000), now=new Date();
    if (d.toDateString()===now.toDateString()) return 'Aujourd\'hui';
    var yest=new Date(now); yest.setDate(now.getDate()-1);
    if (d.toDateString()===yest.toDateString()) return 'Hier';
    var diff=(now-d)/86400000;
    var days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    if (diff<7) return days[d.getDay()];
    return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
}
function _hexToBytes(hex) {
    var b=new Uint8Array(hex.length/2);
    for (var i=0;i<b.length;i++) b[i]=parseInt(hex.slice(i*2,i*2+2),16);
    return b;
}
function _bytesToHex(b) {
    return Array.from(b).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
function _hideLoad()  { document.getElementById('loading').classList.add('hidden'); }
function _setMsg(s)   { var el=document.getElementById('load-msg'); if(el) el.textContent=s; }
function _showBtn()   { var el=document.getElementById('btn-new'); if(el) el.style.display=''; }
// requestAnimationFrame évite un reflow par touche — une seule lecture scrollHeight par frame
var _autoResAf = null;
function _autoRes(el) {
    if (_autoResAf) return;
    _autoResAf = requestAnimationFrame(function() {
        _autoResAf = null;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    });
}

// ── Connection callback ────────────────────────────────────────────────────────
async function _onConnected() {
    var newPub = window.userPubkey;
    if (_myPub && _myPub !== newPub) _decryptCache = {}; // changement d'utilisateur
    _myPub = newPub;
    if (!_myPub) {
        _setMsg('⚠ Aucune clé NOSTR — connectez-vous via l\'en-tête UPlanet');
        _hideLoad();
        return;
    }
    _detectEnc();
    _updateRelayBadge('');

    /* ── Initialiser les widgets ── */
    if (typeof ChatSidebar !== 'undefined') {
        ChatSidebar.init();
        /* Callbacks sidebar → fonctions de cette page */
        ChatSidebar.onOpenConv(function(pk) { _openChat(pk); });
        ChatSidebar.onNewDm(function()   { _openNewDm(); });
        ChatSidebar.onSettings(function(){ if (typeof ChatSettings !== 'undefined') ChatSettings.open(); });
        ChatSidebar.onProfile(function() { if (typeof ChatProfile  !== 'undefined') ChatProfile.open();  });
        ChatSidebar.onSearch(function(q) { _filterConvs(q); });
    }

    if (typeof ChatSettings !== 'undefined') {
        /* Connecter les fonctions relay/publish aux widgets */
        ChatSettings.setRelayFn(function()  { return _relay(); });
        ChatSettings.setQueryFn(function(f) { return _query(f, 6000); });
        ChatSettings.setPublishFn(function(s) { return _publish(s); });
        ChatSettings.onLoaded(function() {
            var ttl = ChatSettings.get('defaultTtl');
            if (ttl && _TTL_STEPS.indexOf(ttl) >= 0) { _ttl = 0; _cycleTTL(); _ttl = ttl; _cycleTTL(); }
        });
        ChatSettings.load(); /* Charger les paramètres chiffrés en arrière-plan */
    }

    if (typeof ChatProfile !== 'undefined') {
        ChatProfile.setPublishFn(function(s) { return _publish(s); });
        ChatProfile.onSaved(function(p) {
            window._chatMyProfile = p;
            if (typeof ChatSidebar !== 'undefined') ChatSidebar.updateMyProfile(p);
        });
        /* Charger le profil de l'utilisateur connecté */
        _profile(_myPub).then(function(p) {
            window._chatMyProfile = p;
            if (typeof ChatSidebar !== 'undefined') ChatSidebar.updateMyProfile(p);
        });
    }

    await _loadConvs();
}

document.addEventListener('DOMContentLoaded', function() {

            _setMsg('⚠ Extension NOSTR requise — Alby, nos2x, Flamingo…');
            setTimeout(_hideLoad, 3500);
        }
    }, 7000);

});
