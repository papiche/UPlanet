<style>
html,body{margin:0;padding:0;background:var(--bg-deep,#080602);color:#e0e0e0;font-family:system-ui,sans-serif;min-height:100dvh}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.page-content{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:58px 14px 80px}
/* Header */
.choir-header{text-align:center;padding:28px 16px 18px;
    background:linear-gradient(180deg,rgba(0,255,204,.05),transparent);
    border-bottom:1px solid rgba(0,255,204,.1);margin-bottom:18px}
.choir-header h1{font-size:1.4rem;font-weight:800;letter-spacing:2px;
    background:linear-gradient(135deg,var(--teal,#00ffcc),var(--primary,#f59e0b));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin:8px 0 4px}
.choir-header p{font-size:.72rem;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase}
/* Mandala */
.mandala-wrap{position:relative;width:100%;max-width:340px;margin:0 auto 18px;aspect-ratio:1}
#mandala{width:100%;height:100%;display:block;border-radius:50%;

/* Atom list */

.atom-rm{background:none;border:none;color:rgba(255,255,255,.25);font-size:.85rem;
    cursor:pointer;padding:2px 5px;flex-shrink:0;transition:color .15s}
.atom-rm:hover{color:#ef4444}
.btn-add-open{display:block;width:100%;padding:9px;border-radius:8px;margin-top:10px;
    background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.15);

    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-size:.65rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:12px}
.kin-union-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    border-radius:10px;padding:12px;text-align:center;margin-top:10px}
.kin-union-num{font-size:2rem;font-weight:800;margin-bottom:2px}
.kin-union-name{font-size:.88rem;font-weight:600;color:#fff}
.kin-union-keys{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:4px;line-height:1.6}
/* T0 */
.t0-block{text-align:center;padding:8px 0}
.t0-time{font-size:1.6rem;font-weight:800;color:var(--teal,#00ffcc)}
.t0-delta{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px}
.t0-hmax{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:4px}
/* Matrix */
.matrix-wrap{overflow-x:auto}
table.matrix{border-collapse:collapse;font-size:.68rem;width:100%}
table.matrix th{padding:4px 6px;color:rgba(255,255,255,.4);text-align:center;font-weight:600}
table.matrix td{padding:4px 6px;text-align:center;border-radius:4px;font-family:monospace}
/* Ritual */
.ritual-block{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);
    border-radius:10px;padding:12px;margin-bottom:10px}
.ritual-icon{font-size:1.4rem;margin-bottom:4px}
.ritual-title{font-size:.78rem;font-weight:700;color:var(--primary,#f59e0b);margin-bottom:4px}
.ritual-text{font-size:.74rem;color:rgba(255,255,255,.55);line-height:1.6}
/* Geometry advice */
.geo-polygon{font-size:.85rem;text-align:center;padding:8px;
    color:var(--teal,#00ffcc);font-weight:600;letter-spacing:.5px}
/* Action bar */
.actions-row{display:flex;gap:8px;margin-top:4px}
.btn-action{flex:1;padding:12px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;
    border:1px solid;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-audio{background:rgba(0,255,204,.08);border-color:rgba(0,255,204,.3);color:var(--teal,#00ffcc)}
.btn-audio:hover{background:rgba(0,255,204,.18)}
.btn-audio.active{background:rgba(0,255,204,.2);box-shadow:0 0 14px rgba(0,255,204,.25)}
.btn-share{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:var(--primary,#f59e0b)}

/* Loading */
.loading-hint{text-align:center;font-size:.72rem;color:rgba(255,255,255,.25);padding:6px 0}
/* Security note */
.sec-note{font-size:.65rem;color:rgba(255,255,255,.2);text-align:center;padding:8px 0}
</style>

<!-- ──────────────────── scripts ──────────────────── -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTES & ÉTAT
   ═══════════════════════════════════════════════════════════════════════════ */
const TAU = 2 * Math.PI;
const OMEGA_DAILY = TAU / (Phi2X ? Phi2X.ORBITAL_DAY_S : 86164); // rad/s — cycle journalier
const KIN_CSS  = ['#ef4444','#94a3b8','#60a5fa','#fbbf24','#34d399']; // Rouge Blanc Bleu Jaune Vert
const KIN_NAMES= ['Rouge','Blanc','Bleu','Jaune','Vert'];
const KIN_EMO  = ['🔴','⚪','🔵','🟡','🟢'];

let ATOMS = [];       // [{id, name, dateStr, lon, phase, kin, color, hex}]
let atomId = 0;
let _audioOn   = false;
let _audioCtx  = null, _audioOscs = [];
let _animId    = null;
let _t0Timeout = null;

/* Couleur CSS d'un atom depuis kin.ci */
function kinColor(kin) { return kin ? KIN_CSS[kin.ci] : '#00ffcc'; }

/* ═══════════════════════════════════════════════════════════════════════════
   ATOMS CRUD
   ═══════════════════════════════════════════════════════════════════════════ */
function addAtom(name, dateStr, lonRaw, hex) {
    if (ATOMS.length >= 13) return;
    const lon   = parseFloat(lonRaw) || 0;
    const kin   = (Phi2X && dateStr) ? Phi2X.calcKinFromDate(dateStr) : null;
    const phase = (Phi2X && dateStr) ? Phi2X.computePhaseFromForm(dateStr, '12:00', lon) : Math.random() * TAU;
    ATOMS.push({ id: ++atomId, name: name || 'Atome ' + atomId, dateStr, lon, phase, kin, color: kinColor(kin), hex: hex || '' });
    updateAll();
}

function removeAtom(id) {
    ATOMS = ATOMS.filter(a => a.id !== id);
    updateAll();
}

/* ═══════════════════════════════════════════════════════════════════════════
   RENDU LISTE
   ═══════════════════════════════════════════════════════════════════════════ */
function renderAtomsList() {
    const el = document.getElementById('atoms-list');
    document.getElementById('atom-count').textContent = ATOMS.length;
    var btnAdd = document.getElementById('btn-add-open');
    if (btnAdd) btnAdd.style.display = ATOMS.length >= 13 ? 'none' : '';

    if (!ATOMS.length) { el.innerHTML = '<div class="loading-hint">Aucun atome — ajoutez le premier</div>'; return; }

    el.innerHTML = ATOMS.map((a, i) =>
        `<div class="atom-item">
            <div class="atom-dot" style="background:${a.color};box-shadow:0 0 6px ${a.color}88"></div>
            <div style="flex:1;min-width:0">
                <div class="atom-name">${_esc(a.name)}</div>
                <div class="atom-kin">${a.kin ? KIN_EMO[a.kin.ci]+' KIN '+a.kin.kin+' · '+a.kin.glyphFr+' '+a.kin.colorFr : '—'}</div>
            </div>
            <div class="atom-phase">φ=${(a.phase).toFixed(2)}</div>
            ${i === 0 ? '<span style="font-size:.65rem;color:rgba(255,255,255,.2);padding:2px 5px">Noyau</span>' : `<button class="atom-rm" onclick="removeAtom(${a.id})" title="Retirer">✕</button>`}
        </div>`
    ).join('');
}

/* ═══════════════════════════════════════════════════════════════════════════
   CALCULS DE GROUPE
   ═══════════════════════════════════════════════════════════════════════════ */
function vectorCoherence(phases) {
    let sx = 0, sy = 0;
    phases.forEach(p => { sx += Math.cos(p); sy += Math.sin(p); });
    return Math.sqrt(sx*sx + sy*sy) / phases.length; // 0 → 1
}

function computeKinUnion(atoms) {
    if (!atoms.length) return null;
    const sum = atoms.reduce((s, a) => s + (a.kin ? a.kin.kin : 0), 0);
    const raw = sum % 260;
    const num = raw === 0 ? 260 : raw;
    return Phi2X ? Phi2X.calcKinFromNum(num) : null;
}

function findT0(atoms) {
    if (atoms.length < 2) return null;
    const nowS   = Date.now() / 1000;
    const phases0 = atoms.map(a => a.phase);
    let bestH = 0, bestT = 0;
    for (let i = 0; i < 96; i++) {          // 24h × 15min
        const dt = i * 900;
        const ph = phases0.map(p => (p + dt * OMEGA_DAILY) % TAU);
        const H  = Phi2X ? Phi2X.groupHarmonyScore(ph) : 0.5;
        if (H > bestH) { bestH = H; bestT = nowS + dt; }
    }
    return { ts: bestT, H: bestH };
}

function hToPercent(H) { return Math.max(0, Math.round((H - 0.5) * 200)); }

/* ═══════════════════════════════════════════════════════════════════════════
   RENDU SCORES
   ═══════════════════════════════════════════════════════════════════════════ */
function renderScores() {
    const n = ATOMS.length;
    ['score-card','t0-card','matrix-card','ritual-card','actions-row']
        .forEach(id => document.getElementById(id).style.display = n >= 2 ? '' : 'none');
    if (n < 2) return;

    const phases = ATOMS.map(a => a.phase);
    const H      = Phi2X ? Phi2X.groupHarmonyScore(phases) : 0.5;
    const Hpct   = hToPercent(H);
    const vc     = vectorCoherence(phases);

    /* H score */
    document.getElementById('h-score').textContent = Hpct + '%';

    /* KIN Union */
    const ku = computeKinUnion(ATOMS);
    const kuEl = document.getElementById('kin-union-wrap');
    if (ku) {
        const col = KIN_CSS[ku.ci];
        kuEl.innerHTML =
            `<div class="kin-union-box" style="border-color:${col}44;background:${col}0a">
                <div class="kin-union-num" style="color:${col}">${KIN_EMO[ku.ci]} KIN ${ku.kin}</div>
                <div class="kin-union-name">${ku.glyphFr} ${ku.colorFr} ${ku.tone}</div>
                <div class="kin-union-keys">
                    ${ku.keys ? ku.keys.map(k=>`<span style="color:rgba(255,255,255,.55)">${k}</span>`).join(' · ') : ''}
                </div>
                <div style="font-size:.65rem;color:rgba(255,255,255,.25);margin-top:6px">
                    Σ KIN des ${n} atomes · Nom du rituel collectif
                </div>
            </div>`;
    }

    /* T0 */
    const t0 = findT0(ATOMS);
    if (t0) {
        const now  = Date.now() / 1000;
        const dt   = t0.ts - now;
        const hh   = Math.floor(dt / 3600);
        const mm   = Math.floor((dt % 3600) / 60);
        const d    = new Date(t0.ts * 1000);
        const fmt  = d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        document.getElementById('t0-time').textContent  = fmt;
        document.getElementById('t0-delta').textContent = `dans ${hh}h${String(mm).padStart(2,'0')}`;
        document.getElementById('t0-hmax').textContent  = `H max = ${hToPercent(t0.H)}% · Cohérence vecteur = ${Math.round(vc*100)}%`;
    }

    /* Pairwise matrix */
    renderMatrix(ATOMS);

    /* Ritual advice */
    renderRitual(ATOMS, ku, Hpct, vc);
}

function renderMatrix(atoms) {
    const n = atoms.length;
    if (n < 2) return;
    let rows = `<table class="matrix"><tr><th></th>`;
    atoms.forEach(a => rows += `<th>${_esc(a.name.slice(0,5))}</th>`);
    rows += '</tr>';
    for (let i = 0; i < n; i++) {
        rows += `<tr><th>${_esc(atoms[i].name.slice(0,5))}</th>`;
        for (let j = 0; j < n; j++) {
            if (i === j) { rows += '<td style="color:rgba(255,255,255,.15)">—</td>'; continue; }
            const k  = Phi2X ? Phi2X.computeResonanceK(atoms[i].phase, atoms[j].phase) : 0.5;
            const pct = hToPercent(k);
            const col = k > 0.85 ? '#00ffcc' : k > 0.7 ? '#f59e0b' : k > 0.6 ? '#60a5fa' : '#94a3b8';
            rows += `<td style="color:${col};background:${col}11">${pct}%</td>`;
        }
        rows += '</tr>';
    }
    rows += '</table>';
    document.getElementById('matrix-wrap').innerHTML = rows;
}

/* ── Conseils du rituel ── */
const GEOMETRY = {
    2:  '2 Atomes • Face à face, regard dans regard, à portée de souffle partagé.',
    3:  '3 Atomes • Triangle équilatéral — chacun voit les deux autres, aucun angle mort.',
    4:  '4 Atomes • Carré ou Croix : 2 pôles face à face, les 4 mains au centre.',
    5:  '5 Atomes • Pentagramme vivant — un atome en haut, les 4 aux pointes.',
    6:  '6 Atomes • Hexagone • Étoile de David — deux triangles entrelacés.',
    7:  '7 Atomes • Cercle de 6 + 1 noyau central, les mains touchant les épaules.',
    8:  '8 Atomes • Octogone ouvert ou double carré croisé.',
    9:  '9 Atomes • Nonagone ou 3 triangles équilatéraux imbriqués.',
    10: '10 Atomes • Décagone ou pentagramme double.',
    11: '11 Atomes • Hendécagone — cercle serré, mains unies.',
    12: '12 Atomes • Dodécagone parfait • 1 par signe — force d\'équanimité maximale.',
    13: '13 Atomes • Icosaèdre vivant • 1 noyau + 12 périphériques — géométrie sacrée complète.',
};
const COLOR_ADVICE = {
    'Rouge': 'Initiez une percée — portez l\'intention d\'une rupture créatrice. Activateurs sur le périmètre, récepteurs au centre.',
    'Blanc': 'Purifiez l\'espace — expirez à l\'unisson, relâchez ce qui retient le groupe. Silence avant la parole.',
    'Bleu':  'Abondance collective — unissez vos intentions en un vœu singulier. L\'élan est déjà là, nommez-le.',
    'Jaune': 'Semez une vision — chaque atome porte une graine du possible. La floraison est collective ou nulle.',
    'Vert':  'Naviguez ensemble — choisissez une direction à l\'unanimité. La navigation exige que nul ne reste en arrière.',
};
const TONE_ADVICE = [
    'Unifiez : respirez en même temps, un seul rythme pour le groupe.',
    'Polarisez : identifiez les deux forces en présence, honorez-les toutes les deux.',
    'Activez : chacun exprime à voix haute son engagement unique dans ce rituel.',
    'Définissez : nommez collectivement le vœu en une seule phrase.',
    'Commandez : un atome prend la parole, les autres amplifient en silence.',
    'Organisez : chacun tient une partie du cercle — la cohérence vient de l\'équilibre.',
    'Canalisez : 7 respirations profondes à l\'unisson avant le silence final.',
    'Harmonisez : cherchez la fréquence commune — la note que vous pouvez tous chanter.',
    'Réalisez : chacun visualise le résultat comme déjà accompli, maintenant.',
    'Perfectionnez : répétez le vœu collectif 10 fois, en montant d\'intensité.',
    'Dissolvez : relâchez toute attente — la projection part mieux dans le vide.',
    'Universalisez : dédiez le résultat non à vous-mêmes, mais à l\'essaim.',
    'Transcendez : restez dans le silence après le rituel — l\'onde se propage seule.',
];

function renderRitual(atoms, ku, Hpct, vc) {
    const n = atoms.length;
    const geoTxt = GEOMETRY[n] || GEOMETRY[13];
    const kuColor = ku ? ku.colorFr : '';
    const colorAdv = COLOR_ADVICE[kuColor] || 'Portez une intention collective claire et partagée.';
    const toneAdv  = ku ? (TONE_ADVICE[ku.ti] || '') : '';
    const qualTxt  = Hpct >= 80 ? 'Cohérence élevée — conditions optimales.' :
                     Hpct >= 60 ? 'Cohérence positive — la synergie est accessible.' :
                     Hpct >= 40 ? 'Friction créatrice — vos différences sont votre moteur.' :
                     'Polarité singulière — l\'attraction des opposés peut ouvrir le champ.';

    /* Fenêtre du rituel (LFO audio en Hz) */
    let freqMin = Infinity, freqMax = 0;
    atoms.forEach(a => {
        if (a.kin) { freqMin = Math.min(freqMin, a.kin.toneNum * 0.15); freqMax = Math.max(freqMax, a.kin.toneNum * 0.15); }
    });
    const beatHz = freqMax - freqMin;
    const breathPer = beatHz > 0 ? Math.round(1 / beatHz) : 13;

    document.getElementById('ritual-content').innerHTML = `
        <div class="ritual-block">
            <div class="ritual-icon">📐</div>
            <div class="ritual-title">Géométrie Spatiale des Corps</div>
            <div class="ritual-text">${geoTxt}</div>
        </div>
        <div class="ritual-block">
            <div class="ritual-icon">${ku ? KIN_EMO[ku.ci] : '🌀'}</div>
            <div class="ritual-title">Intention du KIN Union · ${kuColor}</div>
            <div class="ritual-text">${colorAdv}</div>
        </div>
        <div class="ritual-block">
            <div class="ritual-icon">🎵</div>
            <div class="ritual-title">Accordage des Souffles</div>
            <div class="ritual-text">${toneAdv}
                ${breathPer >= 3 ? `<br>Rythme de battement : 1 respiration toutes les <strong style="color:var(--teal)">${breathPer}s</strong>.` : ''}
            </div>
        </div>
        <div class="ritual-block" style="border-color:rgba(245,158,11,.2)">
            <div class="ritual-icon">⚡</div>
            <div class="ritual-title">État du Champ · ${qualTxt}</div>
            <div class="ritual-text">
                Cohérence vecteur Ψ : <strong style="color:var(--primary)">${Math.round(vc*100)}%</strong>
                — ${vc > 0.7 ? 'Superposition constructive — le champ est prêt.' :
                    vc > 0.4 ? 'Convergence partielle — poursuivez l\'alignement.' :
                    'Diversité maximale — la tension peut devenir force si elle est nommée.'}
            </div>
        </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MANDALA CANVAS
   ═══════════════════════════════════════════════════════════════════════════ */
function drawMandala(ts) {
    const canvas = document.getElementById('mandala');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    if (W === 0) { _animId = requestAnimationFrame(drawMandala); return; }
    canvas.width  = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
    const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.38;

    ctx.clearRect(0, 0, W, H);

    /* Fond radial */
    const bgG = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 1.4);
    bgG.addColorStop(0, 'rgba(0,255,204,.04)'); bgG.addColorStop(1, 'transparent');
    ctx.fillStyle = bgG; ctx.fillRect(0, 0, W, H);

    const n = ATOMS.length;
    if (n === 0) {
        ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.font = '12px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('Aucun atome', cx, cy - 6); ctx.fillText('Ajoutez des membres', cx, cy + 14);
        _animId = requestAnimationFrame(drawMandala); return;
    }

    const t = ts / 1000;
    const OMEGA_VIS = TAU / 25; /* 1 tour / 25 s — visible à l'œil */
    const phases_t  = ATOMS.map(a => (a.phase + t * OMEGA_VIS) % TAU);

    /* Cercle guide */
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU);
    ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = .5; ctx.stroke();

    /* Lignes paires k_ij */
    if (n >= 2) {
        for (let i = 0; i < n; i++) {
            for (let j = i + 1; j < n; j++) {
                const k  = Phi2X ? Phi2X.computeResonanceK(ATOMS[i].phase, ATOMS[j].phase) : 0.5;
                const al = (k - 0.5) * 2;
                const pi = phases_t[i], pj = phases_t[j];
                ctx.beginPath();
                ctx.moveTo(cx + R * Math.cos(pi), cy + R * Math.sin(pi));
                ctx.lineTo(cx + R * Math.cos(pj), cy + R * Math.sin(pj));
                ctx.strokeStyle = `rgba(0,255,204,${al * 0.35})`; ctx.lineWidth = al * 2; ctx.stroke();
            }
        }
    }

    /* Polygone (en ordre de phase) */
    if (n >= 3) {
        const sorted = phases_t.map((p, i) => ({p, i})).sort((a, b) => a.p - b.p);
        ctx.beginPath();
        sorted.forEach((s, si) => {
            const x = cx + R * Math.cos(phases_t[s.i]), y = cy + R * Math.sin(phases_t[s.i]);
            si === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.strokeStyle = 'rgba(0,255,204,.18)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle   = 'rgba(0,255,204,.04)'; ctx.fill();
    }

    /* Ψ vecteur (somme des phaseurs) */
    let psX = 0, psY = 0;
    phases_t.forEach(p => { psX += Math.cos(p); psY += Math.sin(p); });
    psX /= n; psY /= n;
    const psLen = Math.sqrt(psX * psX + psY * psY);
    const psDX  = cx + psX * R * .72, psDY = cy + psY * R * .72;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(psDX, psDY);
    ctx.strokeStyle = `rgba(255,220,80,${.5 + .5 * psLen})`; ctx.lineWidth = 2 + 4 * psLen; ctx.stroke();
    ctx.beginPath(); ctx.arc(psDX, psDY, 5 + 4 * psLen, 0, TAU);
    ctx.fillStyle = '#ffdc50'; ctx.fill();

    /* Points des atomes */
    ATOMS.forEach((a, i) => {
        const ang = phases_t[i];
        const px  = cx + R * Math.cos(ang), py = cy + R * Math.sin(ang);
        /* halo */
        const hl = ctx.createRadialGradient(px, py, 0, px, py, 15);
        hl.addColorStop(0, a.color + '88'); hl.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(px, py, 15, 0, TAU); ctx.fillStyle = hl; ctx.fill();
        /* dot */
        ctx.beginPath(); ctx.arc(px, py, 5, 0, TAU); ctx.fillStyle = a.color; ctx.fill();
        /* label */
        const lblX = cx + (R + 18) * Math.cos(ang), lblY = cy + (R + 18) * Math.sin(ang) + 3;
        ctx.font = 'bold 9px system-ui'; ctx.fillStyle = 'rgba(255,255,255,.7)';
        ctx.textAlign = 'center'; ctx.fillText(a.name.slice(0, 5), lblX, lblY);
    });

    /* Score central H */
    if (n >= 2) {
        const Hpct = hToPercent(Phi2X ? Phi2X.groupHarmonyScore(ATOMS.map(a => a.phase)) : 0.5);
        ctx.font    = `bold ${26 + psLen * 8}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillStyle = psLen > .7 ? '#00ffcc' : psLen > .4 ? '#f59e0b' : '#94a3b8';
        ctx.fillText(Hpct + '%', cx, cy + 9);
        ctx.font      = '9px system-ui';
        ctx.fillStyle = 'rgba(255,255,255,.25)';
        ctx.fillText('Ψ', cx, cy + 22);
    }

    _animId = requestAnimationFrame(drawMandala);
}

/* ═══════════════════════════════════════════════════════════════════════════
   WEB AUDIO — Accord collectif
   ═══════════════════════════════════════════════════════════════════════════ */
function toggleAudio() {
    _audioOn = !_audioOn;
    const btn = document.getElementById('btn-audio');
    if (_audioOn) {
        startAudio();
        btn.textContent = '🔇 Arrêter';
        btn.classList.add('active');
    } else {
        stopAudio();
        btn.textContent = '🔊 Accord';
        btn.classList.remove('active');
    }
}

function startAudio() {
    if (_audioCtx) stopAudio();
    try {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        _audioCtx.resume();
        const master = _audioCtx.createGain(); master.gain.value = 0.18; master.connect(_audioCtx.destination);
        /* Drone base : ~43 Hz (F_WATER / 10) */
        const drone = _audioCtx.createOscillator();
        drone.type = 'sine'; drone.frequency.value = 43;
        const dg = _audioCtx.createGain(); dg.gain.value = .25;
        drone.connect(dg); dg.connect(master); drone.start(); _audioOscs.push(drone);
        /* Un oscillateur par atome : phase → 220-440 Hz */
        ATOMS.forEach(a => {
            const freq = 220 + (a.phase / TAU) * 220;
            const osc  = _audioCtx.createOscillator();
            osc.type   = 'sine'; osc.frequency.value = freq;
            const ag   = _audioCtx.createGain(); ag.gain.value = .18 / Math.max(ATOMS.length, 1);
            osc.connect(ag); ag.connect(master); osc.start(); _audioOscs.push(osc);
        });
    } catch (e) { console.warn('[Choir] Web Audio:', e); }
}

function stopAudio() {
    _audioOscs.forEach(o => { try { o.stop(); } catch(_) {} });
    _audioOscs = [];
    if (_audioCtx) { _audioCtx.close().catch(() => {}); _audioCtx = null; }
}


/* ── Résolution npub → kind 0 (nom + atom4love phase si dispo) ── */
async function resolveNpub(raw) {
    let hex = raw;
    /* Convertir npub en hex si besoin */
    if (raw.startsWith('npub') && window.NostrTools) {
        try { const dec = window.NostrTools.nip19.decode(raw); hex = dec.data; }
        catch(e) { /* ignore */ }
    } else if (raw.startsWith('npub') && typeof nostrDecode === 'function') {
        hex = nostrDecode(raw).data;
    }
    if (!/^[0-9a-f]{64}$/.test(hex)) return null;

    const relayUrl = typeof window.getRelayUrl === 'function' ? window.getRelayUrl()
        : (location.hostname.startsWith('ipfs.') ? 'wss://relay.' + location.hostname.slice(5)
        : location.hostname.startsWith('u.')     ? 'wss://relay.' + location.hostname.slice(2)
        : 'wss://relay.copylaradio.com');

    return new Promise(resolve => {
        const out = {}, ws = new WebSocket(relayUrl);
        const sid = 'ch-' + Math.random().toString(36).slice(2,8);
        const timer = setTimeout(() => { ws.close(); resolve(null); }, 6000);
        ws.onopen  = () => ws.send(JSON.stringify(['REQ', sid, {kinds:[0,30078], authors:[hex], limit:2}]));
        ws.onmessage = e => {
            try {
                const m = JSON.parse(e.data);
                if (m[0] !== 'EVENT') return;
                const ev = m[2];
                if (ev.kind === 0) {
                    const meta = JSON.parse(ev.content);
                    out.name = meta.display_name || meta.name || hex.slice(0,8);
                    out.hex  = hex;
                }
                if (ev.kind === 30078) {
                    try {
                        const c = JSON.parse(ev.content);
                        if (c.birth_date) out.dateStr = c.birth_date;
                        if (c.birth_lon)  out.lon     = parseFloat(c.birth_lon);
                    } catch(_) {}
                }
            } catch(_) {}
        };
        ws.onclose = () => { clearTimeout(timer); resolve(out.name ? out : null); };
        ws.onerror = () => { clearTimeout(timer); ws.close(); resolve(null); };
    });
}

/* ═══════════════════════════════════════════════════════════════════════════
   PARTAGE URL
   ═══════════════════════════════════════════════════════════════════════════ */
function shareGroup() {
    const data = ATOMS.map(a => ({n: a.name, d: a.dateStr || '', lo: a.lon || 0, k: a.kin ? a.kin.kin : 0}));
    try {
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(data)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
        const url  = location.href.split('?')[0] + '?g=' + b64;
        if (navigator.share) { navigator.share({ url, title: '🌀 Chœur des Nœuds' }).catch(() => {}); }
        else { navigator.clipboard.writeText(url).then(() => showNotification({ message: 'Lien copié !', type: 'success' })).catch(() => prompt('Copier ce lien :', url)); }
    } catch(e) { showNotification({ message: 'Impossible de générer le lien', type: 'error' }); }
}

/* ── Charger depuis URL ?g= ── */
function loadFromUrl() {
    const raw = new URLSearchParams(location.search).get('g');
    if (!raw) return;
    try {
        const b64  = raw.replace(/-/g,'+').replace(/_/g,'/');
        const json = JSON.parse(decodeURIComponent(escape(atob(b64 + '='.repeat((4-b64.length%4)%4)))));
        json.forEach(m => addAtom(m.n, m.d, m.lo));
    } catch(e) { console.warn('[Choir] URL decode:', e); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════════ */
(function init() {
    /* Démarrer le mandala */
    _animId = requestAnimationFrame(drawMandala);

    /* Charger depuis URL */
    loadFromUrl();

    /* Si UPH connecté — attendre l'email + phase pour auto-charger l'initiateur */
    if (!ATOMS.length) {
        var tries = 0, waitUph = setInterval(function() {
            if (++tries > 30) { clearInterval(waitUph); return; }
            var email = window._uphEmail, pubkey = window.userPubkey;
            if (!email && !pubkey) return;
            clearInterval(waitUph);
            /* Essayer de récupérer la date depuis le profil NOSTR */
            if (pubkey && window.fetchUserMetadata) {
                window.fetchUserMetadata(pubkey).then(function(meta) {
                    var name = (meta && (meta.display_name || meta.name)) || (email ? email.split('@')[0] : pubkey.slice(0,8));
                    /* kind 30078 atom4love pour la date */
                    var relay = typeof window.getRelayUrl === 'function' ? window.getRelayUrl() : 'wss://relay.copylaradio.com';
                    var ws = new WebSocket(relay), done = false;
                    var sid = 'ci-' + Math.random().toString(36).slice(2,7);
                    setTimeout(function(){ if(!done) { ws.close(); addAtom(name, null, 0); } }, 4000);
                    ws.onopen = function(){ ws.send(JSON.stringify(['REQ', sid, {kinds:[30078], authors:[pubkey], '#d':['atom4love'], limit:1}])); };
                    ws.onmessage = function(e) {
                        try {
                            var m = JSON.parse(e.data);
                            if (m[0] !== 'EVENT') return;
                            var c = JSON.parse(m[2].content);
                            done = true; ws.close();
                            addAtom(name, c.birth_date || null, c.birth_lon || 0, pubkey);
                        } catch(_) {}
                    };
                    ws.onerror = ws.onclose = function() { if (!done) { done = true; addAtom(name, null, 0); } };
                }).catch(function() { addAtom(email ? email.split('@')[0] : 'Noyau', null, 0); });
            } else if (email) {
                addAtom(email.split('@')[0], null, 0);
            }
        }, 300);
    }
})();

<script>
(function() {
    var c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');
    var W, H, pts;
    function resize() {
        W = c.width = window.innerWidth; H = c.height = window.innerHeight;
        pts = Array.from({length:24}, function() { return {
            x:Math.random()*W, y:Math.random()*H,
            vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
            r:Math.random()*1.2+.4 }; });
    }
    function draw() {
        ctx.clearRect(0,0,W,H);
        pts.forEach(function(p) {
            p.x+=p.vx; p.y+=p.vy;
            if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
            ctx.fillStyle='rgba(0,255,204,.12)'; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    resize(); window.addEventListener('resize', resize); draw();
})();
</script>
