<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Technique — Le Rocket Dome Φ | Made In Zion</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        :root {
            --em:  #00C968; --em-dk: #027A48;
            --gold:#FFD700; --gold-dim:#b89a00;
            --mv:  #9B30FF;
            --cy:  #00ccff;
            --bg:  #021a11;
            --acc: var(--em);
        }
        body{background:var(--bg);color:#e0f2e9;font-family:'Segoe UI',system-ui,sans-serif}
        body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
            background:radial-gradient(circle at 15% 20%,rgba(0,201,104,.09),transparent 30%)}
        a{color:var(--cy)}
        .crumb{padding:1.2rem 1rem 0;font-size:.8rem;display:flex;gap:1rem;flex-wrap:wrap}
        .crumb a{color:rgba(255,255,255,.45);text-decoration:none}
        .crumb a:hover{color:var(--acc)}
        .md-wrap{max-width:820px;margin:0 auto;padding:2rem 1.2rem 4rem}
        #md-status{text-align:center;color:rgba(255,255,255,.4);padding:3rem 0;font-size:.9rem}

        /* ── Sommaire ── */
        #toc{background:rgba(0,0,0,.3);border:1px solid rgba(0,201,104,.22);border-radius:12px;
             padding:1rem 1.3rem;margin-bottom:1.4rem}
        #toc summary{color:var(--gold);font-weight:700;cursor:pointer;font-size:.92rem;
                    letter-spacing:.5px;list-style:none;outline:none}
        #toc summary::-webkit-details-marker{display:none}
        #toc summary::before{content:'▸ ';display:inline-block;transition:transform .2s}
        #toc[open] summary::before{transform:rotate(90deg)}
        #toc nav{margin-top:.8rem;display:flex;flex-direction:column;gap:.35rem}
        #toc nav a{color:#b3d4c4;text-decoration:none;font-size:.85rem;padding:.15rem 0}
        #toc nav a:hover{color:var(--em)}
        #toc nav a.sub{padding-left:1.2rem;font-size:.8rem;color:rgba(179,212,196,.7)}

        /* ── Typographie du markdown rendu ── */
        #md-content{background:rgba(0,0,0,.28);border:1px solid rgba(0,201,104,.2);
                    border-radius:14px;padding:2rem 2.4rem;line-height:1.8;font-size:1rem;color:#d3ecdf}
        #md-content h1{color:var(--gold);font-size:1.7rem;margin:0 0 1.2rem;text-shadow:0 0 20px rgba(255,215,0,.25)}
        #md-content h2{color:var(--em);font-size:1.25rem;margin:2.4rem 0 1.1rem;padding:.3rem 0 .3rem .8rem;
                       border-left:3px solid var(--em);scroll-margin-top:1rem}
        #md-content h2:first-of-type{margin-top:0}
        #md-content h3{color:var(--cy);font-size:1.05rem;margin:1.7rem 0 .8rem;scroll-margin-top:1rem}
        #md-content p{margin:0 0 1.1rem}
        #md-content ul, #md-content ol{padding-left:1.5rem;margin:0 0 1.1rem}
        #md-content li{margin-bottom:.45rem}
        #md-content strong{color:#fff}
        #md-content em{color:var(--gold-dim)}
        #md-content code{background:rgba(255,255,255,.08);border-radius:4px;padding:.1rem .35rem;
                         font-size:.85em;color:var(--cy)}
        #md-content pre{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);
                        border-radius:8px;padding:1rem;overflow-x:auto}
        #md-content pre code{background:none;padding:0;color:#c7e2d6}
        #md-content blockquote{border-left:3px solid var(--mv);margin:0 0 1rem;padding:.4rem 1rem;
                               color:rgba(255,255,255,.65);background:rgba(155,48,255,.06);border-radius:0 8px 8px 0}
        #md-content hr{border:none;border-top:1px solid rgba(255,255,255,.12);margin:2rem 0}
        #md-content a{color:var(--cy);text-decoration:underline}
        #md-content table{width:100%;border-collapse:collapse;margin:0 0 1.4rem;font-size:.85rem;
                          display:block;overflow-x:auto;white-space:nowrap}
        #md-content th, #md-content td{border:1px solid rgba(255,255,255,.12);padding:.5rem .7rem;text-align:left}
        #md-content th{background:rgba(0,201,104,.1);color:var(--em)}
        #md-content tr:nth-child(even) td{background:rgba(255,255,255,.03)}

        /* ── Schémas SVG intégrés au markdown ── */
        #md-content .diagram-wrap{background:rgba(0,0,0,.4);border:1px solid rgba(0,201,104,.22);
            border-radius:12px;padding:1.1rem 1rem .6rem;margin:0 0 1.5rem;overflow-x:auto}
        #md-content .diagram-wrap svg{display:block;margin:0 auto;max-width:100%;height:auto}
        #md-content .diagram-cap{text-align:center;font-size:.72rem;color:rgba(255,255,255,.4);
            margin-top:.5rem;font-style:italic;white-space:normal}

        .btn-cta{display:block;width:100%;padding:.9rem 1.5rem;font-size:1.05rem;
                  font-weight:700;text-transform:uppercase;background:linear-gradient(90deg,var(--gold),#ffea75);
                  color:#000;border:none;border-radius:10px;cursor:pointer;text-align:center;
                  transition:all .3s;box-shadow:0 0 20px rgba(255,215,0,.3);text-decoration:none}
        .btn-cta:hover{box-shadow:0 0 34px rgba(255,215,0,.6);transform:scale(1.02);color:#000}
        footer{text-align:center;padding:2.5rem 1rem;color:var(--em-dk);font-size:.85rem}
        footer a{color:var(--gold-dim);text-decoration:none}
        footer a:hover{text-decoration:underline}

        /* ── Retour en haut ── */
        #top-btn{position:fixed;right:1.1rem;bottom:1.1rem;width:42px;height:42px;border-radius:50%;
                 background:rgba(0,201,104,.16);border:1px solid rgba(0,201,104,.4);color:var(--em);
                 font-size:1.15rem;cursor:pointer;display:none;align-items:center;justify-content:center;
                 box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:500;transition:background .2s,opacity .2s}
        #top-btn:hover{background:rgba(0,201,104,.3)}
        #top-btn.show{display:flex}
    </style>
</head>
<body>

<div class="crumb">
    <a href="vaisseau.html">← Le Vaisseau</a>

</div>

<div class="md-wrap">
    <div id="md-status">📐 Chargement du manuel…</div>
    <details id="toc" style="display:none">
        <summary>Sommaire</summary>
        <nav id="toc-nav"></nav>
    </details>
    <article id="md-content" style="display:none"></article>

    <div class="mt-4">
        <a href="vaisseau.html" class="btn-cta">🛖 Retour au Vaisseau</a>
    </div>
</div>

<button id="top-btn" title="Retour en haut" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer>

<script src="nacl-fast.min.js"></script>
<script src="nostr.bundle.js"></script>
<script src="common.js"></script>
<script src="uplanet-header.js"></script>
<script src="marked.min.js"></script>
<script>
marked.setOptions({ breaks: false, gfm: true, mangle: false, headerIds: false });

function _slugify(text) {
    return text.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')  // enlève les accents
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function _buildToc() {
    var content = document.getElementById('md-content');
    var nav = document.getElementById('toc-nav');
    var heads = content.querySelectorAll('h2, h3');
    if (!heads.length) return;
    var seen = {};
    heads.forEach(function (h) {
        var base = _slugify(h.textContent);
        var slug = base;
        var n = 1;
        while (seen[slug]) { slug = base + '-' + (++n); }
        seen[slug] = true;
        h.id = slug;
        var a = document.createElement('a');
        a.href = '#' + slug;
        a.textContent = h.textContent;
        if (h.tagName === 'H3') a.className = 'sub';
        nav.appendChild(a);
    });
    document.getElementById('toc').style.display = 'block';
}

fetch('dome.md')
    .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
    })
    .then(function (md) {
        document.getElementById('md-content').innerHTML = marked.parse(md);
        document.getElementById('md-status').style.display = 'none';
        document.getElementById('md-content').style.display = 'block';
        _buildToc();
    })
    .catch(function (e) {
        document.getElementById('md-status').textContent = '⚠ Impossible de charger dome.md (' + e.message + ')';
    });

// ── Bouton retour en haut ──────────────────────────────────────────────────
window.addEventListener('scroll', function () {
    var btn = document.getElementById('top-btn');
    if (window.scrollY > 400) btn.classList.add('show');
    else btn.classList.remove('show');
});
</script>

</body>
