<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 MULTIPASS Keygen: v1 (Scrypt) & v2 (Mnemonic)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #fff; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.25rem; }
        
        .tabs { display: flex; border-bottom: 1px solid #444; margin-bottom: 1rem; }
        .tab { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; color: #888; font-weight: 600; }
        .tab.active { color: #0a7ea4; border-bottom-color: #0a7ea4; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label { display: block; margin-bottom: 0.35rem; font-weight: 600; color: #ccc; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #eee;
            font-size: 1rem;
        }
        select option { background: #2a2a2a; }
        textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, monospace; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #0a7ea4; }
        
        button {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0a7ea4;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        button.secondary { background: #444; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }

        .lang-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        .lang-row label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
        .lang-row select { margin-bottom: 0; flex: 1; }
        .lang-status { font-size: 0.75rem; color: #888; }
        .lang-status.ok { color: #6a6; }
        .lang-status.loading { color: #fa0; }
        .lang-status.error { color: #e66; }

        .word-count-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .word-count-row label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; align-self: center; }
        .word-count-row select { margin-bottom: 0; flex: 1; }

        .result { margin-top: 1.25rem; padding: 1rem; background: #252525; border-radius: 6px; border: 1px solid #333; }
        .result pre { font-family: ui-monospace, monospace; font-size: 0.8rem; word-break: break-all; white-space: pre-wrap; color: #fff; }
        .error { color: #e66; } .success { color: #6a6; }
        
        .extra-keys { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #333; display: grid; gap: 1rem; }
        .key-block label { font-size: 0.85rem; color: #aaa; }
        .key-block input { font-family: ui-monospace, monospace; font-size: 0.9rem; margin-bottom: 0; }
        .g1-key input { color: #ffd700; border-color: #554400; }
        .ipfs-key input { color: #69c4cd; border-color: #204d52; }

        .btn-row { display: flex; gap: 0.5rem; }
        .btn-row button { flex: 1; }
    </style>

    <!-- NaCl & Scrypt (Legacy v1) -->
    <script src="nacl-fast.min.js"></script>
    <script src="scrypt.min.js"></script>
    
    <!-- Nostr (Standalone) -->
    <script src="nostr.bundle.js"></script>

    <!-- BIP39 — new lib with CDN wordlist loading -->
    <script src="bip39-libs.js"></script>

    <!-- Blake2b -->
    <script src="blake2b_browser.js"></script>

    <!-- Base58 -->
    <script>
        (function() {
            const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            window.bs58 = {
                encode: function(buf) {
                    if (!buf.length) return '';
                    let i, j, digits = [0];
                    for (i = 0; i < buf.length; i++) {
                        for (j = 0; j < digits.length; j++) digits[j] <<= 8;
                        digits[0] += buf[i];
                        let carry = 0;
                        for (j = 0; j < digits.length; j++) {
                            digits[j] += carry;
                            carry = (digits[j] / 58) | 0;
                            digits[j] %= 58;
                        }
                        while (carry) { digits.push(carry % 58); carry = (carry / 58) | 0; }
                    }
                    for (i = 0; i < buf.length && buf[i] === 0; i++) digits.push(0);
                    return digits.reverse().map(d => A[d]).join('');
                }
            };
        })();
    </script>
</head>
<body>
    <h1>Universal Keygen</h1>
    <p class="subtitle">Compatible Duniter v1 (Login/Pass) &amp; v2 (Mnemonic/BIP39)</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('v1')">Legacy (v1)</div>
        <div class="tab" onclick="switchTab('v2')">Mnemonic (v2)</div>
        <div class="tab" onclick="switchTab('live')">Live Typing</div>
    </div>

    <!-- V1 -->
    <div id="tab-v1" class="tab-content active">
        <label for="salt">Salt (login / username)</label>
        <input type="text" id="salt" placeholder="e.g. mylogin" autocomplete="username">
        <label for="pepper">Pepper (password)</label>
        <input type="password" id="pepper" placeholder="Your password" autocomplete="current-password">
    </div>

    <!-- Live Typing -->
    <div id="tab-live" class="tab-content">
        <label for="live-input">Type your phrase (alternates letters to salt/pepper)</label>
        <textarea id="live-input" placeholder="Start typing here..." style="min-height: 120px;"></textarea>
        
        <div style="margin-bottom: 1rem; background: #222; padding: 1rem; border-radius: 6px; border: 1px solid #444;">
            <label style="margin-bottom: 0.5rem;">Security Level (Entropy)</label>
            <div style="width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-bottom: 0.5rem;">
                <div id="entropy-bar" style="height: 100%; width: 0%; background: #e66; transition: width 0.3s, background-color 0.3s;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #888;">
                <span>0 bits</span>
                <span id="entropy-text">0 bits</span>
                <span>128 bits (12 words)</span>
            </div>
            <p id="entropy-status" style="font-size: 0.8rem; margin-top: 0.5rem; margin-bottom: 0; color: #e66;">Too weak</p>
        </div>

        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
                <label>Salt (odd letters)</label>
                <input type="text" id="live-salt" readonly style="background: #222; color: #888;">
            </div>
            <div style="flex: 1;">
                <label>Pepper (even letters)</label>
                <input type="text" id="live-pepper" readonly style="background: #222; color: #888;">
            </div>
        </div>
    </div>

    <!-- V2 -->
    <div id="tab-v2" class="tab-content">

        <!-- Language selector -->
        <div class="lang-row">
            <label for="lang-select">Language</label>
            <select id="lang-select" onchange="onLangChange(this.value)">
                <option value="english">🇬🇧 English</option>
                <option value="french">🇫🇷 French / Français</option>
                <option value="spanish">🇪🇸 Spanish / Español</option>
                <option value="italian">🇮🇹 Italian / Italiano</option>
                <option value="portuguese">🇵🇹 Portuguese / Português</option>
                <option value="czech">🇨🇿 Czech / Čeština</option>
                <option value="japanese">🇯🇵 Japanese / 日本語</option>
                <option value="chinese_simplified">🇨🇳 Chinese Simplified / 简体中文</option>
                <option value="chinese_traditional">🇹🇼 Chinese Traditional / 繁體中文</option>
                <option value="korean">🇰🇷 Korean / 한국어</option>
            </select>
            <span id="lang-status" class="lang-status">loading…</span>
        </div>

        <!-- Word count -->
        <div class="word-count-row">
            <label for="word-count">Words</label>
            <select id="word-count">
                <option value="128">12 words (128 bits)</option>
                <option value="160">15 words (160 bits)</option>
                <option value="192">18 words (192 bits)</option>
                <option value="224">21 words (224 bits)</option>
                <option value="256">24 words (256 bits)</option>
            </select>
        </div>

        <label for="mnemonic">Mnemonic Phrase</label>
        <textarea id="mnemonic" placeholder="abandon ability able about above absent…"></textarea>

        <div class="btn-row">
            <button class="secondary" id="btn-gen" style="width:auto; font-size: 0.8rem; padding: 0.4rem 0.8rem;">🎲 Generate Random Words</button>
            <button class="secondary" id="btn-validate" style="width:auto; font-size: 0.8rem; padding: 0.4rem 0.8rem;">✓ Validate</button>
        </div>

        <div style="margin-top: 1rem;">
            <label for="passphrase">Passphrase (Optional)</label>
            <input type="password" id="passphrase" placeholder="Optional BIP39 passphrase">
        </div>
    </div>

    <button id="btn" style="margin-top: 0.5rem;">Derive All Keys</button>

    <div id="status" class="result" style="display: none;"></div>
    
    <div class="extra-keys">
        <div class="key-block g1-key">
            <label>Ed25519 PubKey (Duniter/G1) - Base58:</label>
            <input type="text" id="g1_pub" readonly placeholder="…" />
        </div>
        <div class="key-block g1-key">
            <label>Duniter v2 SS58 Address (Ğ1v2):</label>
            <input type="text" id="g1_v2_pub" readonly placeholder="…" />
        </div>
        <div class="key-block ipfs-key">
            <label>IPNS Name (CIDv1 Base36):</label>
            <input type="text" id="ipns_key" readonly placeholder="…" />
        </div>
    </div>

    <div id="out" class="result" style="display: none;"></div>

    <details style="margin-top: 1rem;">
        <summary style="cursor: pointer; color: #888;">Debug logs</summary>
        <pre id="debugLog" style="font-size: 0.75rem; max-height: 200px; overflow: auto; background: #222; padding: 0.5rem; border-radius: 4px; margin: 0.25rem 0 0;"></pre>
    </details>

    <script>
        let currentMode = 'v1';
        let currentLang = 'english';

        const saltEl       = document.getElementById('salt');
        const pepperEl     = document.getElementById('pepper');
        const mnemonicEl   = document.getElementById('mnemonic');
        const passphraseEl = document.getElementById('passphrase');
        const langSelect   = document.getElementById('lang-select');
        const langStatus   = document.getElementById('lang-status');
        const wordCount    = document.getElementById('word-count');
        const btn          = document.getElementById('btn');
        const btnGen       = document.getElementById('btn-gen');
        const btnValidate  = document.getElementById('btn-validate');
        const statusEl     = document.getElementById('status');
        const outEl        = document.getElementById('out');
        const g1El         = document.getElementById('g1_pub');
        const g1v2El       = document.getElementById('g1_v2_pub');
        const ipnsEl       = document.getElementById('ipns_key');
        const debugEl      = document.getElementById('debugLog');
        const debugLines   = [];

        function debugLog(msg) {
            debugLines.push(msg);
            if (debugEl) debugEl.textContent = debugLines.join('\n');
            console.log(msg);
        }

        function setLangStatus(state, msg) {
            langStatus.textContent = msg;
            langStatus.className = 'lang-status ' + state;
        }

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            let tabIndex = 0;
            if (mode === 'v2') tabIndex = 1;
            else if (mode === 'live') tabIndex = 2;
            
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
            document.getElementById('tab-' + mode).classList.add('active');
            statusEl.style.display = 'none';
            outEl.style.display = 'none';
            
            if (mode === 'live') {
                btn.style.display = 'none';
                document.getElementById('live-input').focus();
            } else {
                btn.style.display = 'block';
            }
        }

        async function onLangChange(lang) {
            currentLang = lang;
            setLangStatus('loading', 'loading…');
            try {
                await bip39.init(lang);
                setLangStatus('ok', '✓ ready');
            } catch(e) {
                setLangStatus('error', '✗ load failed');
                debugLog('Wordlist error: ' + e.message);
            }
        }

        function toBase36(uint8array) {
            const alphabet = '0123456789abcdefghijklmnopqrstuvwxyz';
            let value = 0n;
            for (const byte of uint8array) value = (value << 8n) + BigInt(byte);
            let output = '';
            while (value > 0n) {
                output = alphabet[Number(value % 36n)] + output;
                value /= 36n;
            }
            return output || '0';
        }

        // ── V1: Scrypt ───────────────────────────────────────────────────────
        const N = 4096, r = 16, p = 1, dkLen = 32;
        
        // Calcul de la mémoire consommée par Scrypt
        // Formule approximative : 128 * N * r * p octets
        const scryptMemoryBytes = 128 * N * r * p;
        const scryptMemoryMB = (scryptMemoryBytes / (1024 * 1024)).toFixed(2);

        function scryptPromise(password, salt) {
            return new Promise((resolve, reject) => {
                if (typeof scrypt === 'undefined') return reject(new Error('scrypt.min.js missing'));
                try {
                    const res = scrypt.scrypt(password, salt, N, r, p, dkLen);
                    if (res instanceof Promise) {
                        res.then(k => resolve(new Uint8Array(k))).catch(reject);
                    } else {
                        scrypt.scrypt(password, salt, N, r, p, dkLen, (e, k) => e ? reject(e) : resolve(new Uint8Array(k)));
                    }
                } catch(e) {
                    try { scrypt(password, salt, N, r, p, dkLen, (e, k) => e ? reject(e) : resolve(new Uint8Array(k))); }
                    catch(e2) { reject(e2); }
                }
            });
        }

        // ── MAIN DERIVE ──────────────────────────────────────────────────────
        async function derive(forceSalt = null, forcePepper = null) {
            const NostrLib = window.NostrTools || window.Nostr;
            if (!NostrLib) { alert('ERREUR: nostr.bundle.js manquant'); return; }
            if (typeof nacl === 'undefined') { alert('ERREUR: nacl-fast.min.js manquant'); return; }

            btn.disabled = true;
            statusEl.style.display = 'block';
            statusEl.innerHTML = 'Computing…';
            statusEl.className = 'result';
            outEl.style.display = 'none';
            debugLines.length = 0;
            debugEl.textContent = '';

            try {
                let seed; // 32 bytes Uint8Array

                if (currentMode === 'v1' || currentMode === 'live') {
                    let salt, pepper;
                    if (currentMode === 'live') {
                        salt = forceSalt || '';
                        pepper = forcePepper || '';
                        if (!salt && !pepper) throw new Error('Please type something');
                    } else {
                        salt   = (saltEl.value || '').trim();
                        pepper = pepperEl.value || '';
                        if (!salt || !pepper) throw new Error('Please enter login and password');
                    }
                    
                    const startTime = performance.now();
                    debugLog('Mode ' + currentMode + ': Scrypt derivation… (N=' + N + ', r=' + r + ', p=' + p + ')');
                    debugLog('Estimated memory usage: ~' + scryptMemoryMB + ' MB');
                    
                    seed = await scryptPromise(new TextEncoder().encode(pepper), new TextEncoder().encode(salt));
                    
                    const endTime = performance.now();
                    const duration = (endTime - startTime).toFixed(0);
                    debugLog('Scrypt computation finished in ' + duration + ' ms');

                } else {
                    // ── MODE V2: Mnemonic ──────────────────────────────────
                    if (typeof bip39 === 'undefined') throw new Error('bip39-libs.js not loaded');

                    const mnemonic   = (mnemonicEl.value || '').trim();
                    const passphrase = passphraseEl.value || '';
                    if (!mnemonic) throw new Error('Please enter a mnemonic phrase');

                    debugLog('Mode V2: Validating mnemonic…');
                    const valid = await bip39.validateMnemonic(mnemonic, currentLang);
                    if (!valid) throw new Error('Invalid mnemonic phrase (checksum failed or wrong language)');

                    debugLog('Mode V2: BIP39 PBKDF2 derivation…');

                    // *** KEY FIX: mnemonicToSeedHex is ASYNC — must await ***
                    const seedHex = await bip39.mnemonicToSeedHex(mnemonic, passphrase);

                    // Convert hex → bytes (64 bytes), take first 32 for Ed25519
                    const rawSeed = new Uint8Array(seedHex.length / 2);
                    for (let i = 0; i < rawSeed.length; i++)
                        rawSeed[i] = parseInt(seedHex.substr(i * 2, 2), 16);

                    seed = rawSeed.slice(0, 32);
                    debugLog('Seed (32 bytes) computed. seedHex length: ' + seedHex.length);
                }

                // ── Ed25519 Keys (G1 / IPNS) ─────────────────────────────
                const edKeyPair  = nacl.sign.keyPair.fromSeed(seed);
                const pubKeyBytes = edKeyPair.publicKey;

                g1El.value  = window.bs58.encode(pubKeyBytes);

                // ── Duniter v2 SS58 Address ──────────────────────────────
                const SS58_PREFIX = 4450;
                const first = ((SS58_PREFIX & 0xFC) >> 2) | 0x40;
                const second = (SS58_PREFIX >> 8) | ((SS58_PREFIX & 0x03) << 6);
                const payload = new Uint8Array(2 + pubKeyBytes.length);
                payload[0] = first;
                payload[1] = second;
                payload.set(pubKeyBytes, 2);
                
                const prefixBytes = new TextEncoder().encode('SS58PRE');
                const checksumInput = new Uint8Array(prefixBytes.length + payload.length);
                checksumInput.set(prefixBytes, 0);
                checksumInput.set(payload, prefixBytes.length);
                
                const checksum = window.blake2b.blake2b(checksumInput, null, 64).slice(0, 2);
                
                const ss58Bytes = new Uint8Array(payload.length + checksum.length);
                ss58Bytes.set(payload, 0);
                ss58Bytes.set(checksum, payload.length);
                
                g1v2El.value = window.bs58.encode(ss58Bytes);

                const header    = new Uint8Array([0x01, 0x72, 0x00, 0x24, 0x08, 0x01, 0x12, 0x20]);
                const ipnsBuf   = new Uint8Array(header.length + pubKeyBytes.length);
                ipnsBuf.set(header);
                ipnsBuf.set(pubKeyBytes, header.length);
                ipnsEl.value = 'k' + toBase36(ipnsBuf);

                // ── Nostr Keys (secp256k1) ────────────────────────────────
                const privKeyBuf   = await crypto.subtle.digest('SHA-256', seed);
                const privKeyBytes = new Uint8Array(privKeyBuf);
                const privHex      = Array.from(privKeyBytes).map(b => ('0' + b.toString(16)).slice(-2)).join('');

                let pubHex, nsec, npub;
                pubHex = NostrLib.getPublicKey ? NostrLib.getPublicKey(privHex) : NostrLib.getPublicKey(privKeyBytes);
                if (NostrLib.nip19) {
                    nsec = NostrLib.nip19.nsecEncode(privHex);
                    npub = NostrLib.nip19.npubEncode(pubHex);
                }

                statusEl.innerHTML = '<span class="success">✓ Keys generated successfully!</span>';
                outEl.style.display = 'block';
                
                let extensionLink = '';
                const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
                if (isFirefox) {
                    extensionLink = '<p style="font-size: 0.85rem; margin-bottom: 1rem;">🦊 <a href="https://addons.mozilla.org/fr/firefox/addon/nos2x-fox/" target="_blank" style="color: #0a7ea4;">Installer l\'extension nos2x-fox pour Firefox</a></p>';
                } else {
                    extensionLink = '<p style="font-size: 0.85rem; margin-bottom: 1rem;">🧩 <a href="https://chromewebstore.google.com/detail/nos2x/kpgefcfmnafjgpblomihpgmejjdanjjp" target="_blank" style="color: #0a7ea4;">Installer l\'extension nos2x pour Chrome/Brave</a></p>';
                }

                outEl.innerHTML = extensionLink +
                    '<h3>Nostr nsec</h3><pre style="cursor: pointer;" onclick="copyNsec(this, \'' + (nsec || privHex) + '\')" title="Cliquez pour copier et ouvrir Coracle">' + (nsec || privHex) + '</pre>' +
                    '<h3>Nostr npub</h3><pre>' + (npub || pubHex) + '</pre>';

            } catch(e) {
                console.error(e);
                statusEl.innerHTML = '<span class="error">Error: ' + (e.message || e) + '</span>';
            } finally {
                btn.disabled = false;
            }
        }

        // ── Generate mnemonic ────────────────────────────────────────────────
        btnGen.addEventListener('click', async () => {
            if (typeof bip39 === 'undefined') { alert('BIP39 lib not loaded'); return; }
            btnGen.disabled = true;
            try {
                setLangStatus('loading', 'loading…');
                const strength = parseInt(wordCount.value, 10);
                const mn = await bip39.generateMnemonic(strength, currentLang);
                mnemonicEl.value = mn;
                setLangStatus('ok', '✓ ready');
                statusEl.style.display = 'block';
                statusEl.innerHTML = 'New mnemonic generated (' + mn.split(' ').length + ' words, ' + currentLang + ').';
                statusEl.className = 'result';
            } catch(e) {
                setLangStatus('error', '✗ failed');
                statusEl.style.display = 'block';
                statusEl.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
                statusEl.className = 'result';
            } finally {
                btnGen.disabled = false;
            }
        });

        // ── Validate ─────────────────────────────────────────────────────────
        btnValidate.addEventListener('click', async () => {
            const mnemonic = (mnemonicEl.value || '').trim();
            if (!mnemonic) return;
            btnValidate.disabled = true;
            try {
                const valid = await bip39.validateMnemonic(mnemonic, currentLang);
                statusEl.style.display = 'block';
                statusEl.className = 'result';
                statusEl.innerHTML = valid
                    ? '<span class="success">✓ Valid mnemonic</span>'
                    : '<span class="error">✗ Invalid mnemonic (bad checksum or wrong language)</span>';
            } catch(e) {
                statusEl.style.display = 'block';
                statusEl.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            } finally {
                btnValidate.disabled = false;
            }
        });

        btn.addEventListener('click', derive);

        // ── Copy nsec & Open Coracle ─────────────────────────────────────────
        function copyNsec(el, nsec) {
            navigator.clipboard.writeText(nsec).then(() => {
                const originalText = el.innerText;
                el.innerText = '✓ Copié dans le presse-papier !';
                el.style.color = '#6a6';
                setTimeout(() => {
                    el.innerText = originalText;
                    el.style.color = '#fff';
                }, 2000);
                
                // Afficher la frame d'explication et ouvrir Coracle
                showNostrConnectFrame();
            }).catch(err => {
                console.error('Erreur lors de la copie :', err);
                alert('Erreur lors de la copie du nsec.');
            });
        }

        function showNostrConnectFrame() {
            // Créer l'overlay
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            overlay.style.zIndex = '9999';
            overlay.style.display = 'flex';
            overlay.style.flexDirection = 'column';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.padding = '2rem';

            // Créer la boîte de dialogue
            const dialog = document.createElement('div');
            dialog.style.backgroundColor = '#1a1a1a';
            dialog.style.padding = '2rem';
            dialog.style.borderRadius = '8px';
            dialog.style.border = '1px solid #444';
            dialog.style.maxWidth = '600px';
            dialog.style.width = '100%';
            dialog.style.textAlign = 'center';
            dialog.style.boxShadow = '0 4px 20px rgba(0,0,0,0.5)';

            dialog.innerHTML = `
                <h2 style="color: #fff; margin-top: 0;">🔑 Activer Nostr Connect</h2>
                <p style="color: #ccc; text-align: left; line-height: 1.5;">
                    Votre clé privée (nsec) a été copiée dans le presse-papier.
                </p>
                <ol style="color: #ccc; text-align: left; line-height: 1.5; margin-bottom: 2rem;">
                    <li>Ouvrez l'extension <strong>nos2x</strong> (ou <strong>nos2x-fox</strong>) que vous venez d'installer.</li>
                    <li>Allez dans les <strong>Options</strong> ou <strong>Paramètres</strong> de l'extension.</li>
                    <li>Collez votre clé privée (nsec) dans le champ prévu à cet effet.</li>
                    <li>Enregistrez. L'extension gérera désormais vos signatures de manière sécurisée.</li>
                </ol>
                <p style="color: #ccc; text-align: left; line-height: 1.5; margin-bottom: 2rem;">
                    Une fois cela fait, vous pourrez vous connecter à Coracle en utilisant l'extension (Nostr Connect / NIP-07).
                </p>
                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <button id="btn-open-coracle" style="background: #0a7ea4; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                        Ouvrir Coracle
                    </button>
                    <button id="btn-open-uplanet" style="background: #204d52; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                        Ouvrir UPlanet
                    </button>
                </div>
                <button id="btn-close-dialog" style="background: transparent; color: #888; border: none; padding: 0.75rem 1.5rem; margin-top: 1rem; cursor: pointer; text-decoration: underline;">
                    Fermer
                </button>
            `;

            overlay.appendChild(dialog);
            document.body.appendChild(overlay);

            document.getElementById('btn-open-coracle').addEventListener('click', () => {
                window.open('/ipns/coracle.copylaradio.com', '_blank');
                document.body.removeChild(overlay);
            });

            document.getElementById('btn-open-uplanet').addEventListener('click', () => {
                window.open('https://u.copylaradio.com/g1', '_blank');
                document.body.removeChild(overlay);
            });

            document.getElementById('btn-close-dialog').addEventListener('click', () => {
                document.body.removeChild(overlay);
            });
        }

        // ── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('load', async () => {
            debugLog('Ready. Mode: ' + currentMode);
            if (typeof bip39 !== 'undefined') {
                debugLog('BIP39 lib loaded, loading English wordlist…');
                setLangStatus('loading', 'loading…');
                try {
                    await bip39.init('english');
                    setLangStatus('ok', '✓ ready');
                    debugLog('BIP39 English wordlist OK (' + bip39.WORDLISTS.english.length + ' words)');
                } catch(e) {
                    setLangStatus('error', '✗ load failed');
                    debugLog('BIP39 init failed: ' + e.message);
                }
            } else {
                debugLog('WARNING: BIP39 lib MISSING');
                setLangStatus('error', '✗ missing');
            }
        });
    </script>
</body>
</html>
