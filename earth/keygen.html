        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main); font-size: 0.9rem; }
        input[type="text"], input[type="password"], textarea, select {

            border: 1px solid var(--border);
            border-radius: 8px;

        select option { background: #0f172a; }
        textarea { resize: vertical; min-height: 100px; font-family: ui-monospace, monospace; line-height: 1.5; }
        input:focus, textarea:focus, select:focus {

            border-color: var(--accent);

    <!-- Base58 -->
    <script>
        (function() {
            const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            window.bs58 = {
                encode: function(buf) {
                    if (!buf.length) return '';
                    let i, j, digits = [0];
                    for (i = 0; i < buf.length; i++) {
                        for (j = 0; j < digits.length; j++) digits[j] <<= 8;
                        digits[0] += buf[i];
                        let carry = 0;
                        for (j = 0; j < digits.length; j++) {
                            digits[j] += carry;
                            carry = (digits[j] / 58) | 0;
                            digits[j] %= 58;
                        }
                        while (carry) { digits.push(carry % 58); carry = (carry / 58) | 0; }
                    }
                    for (i = 0; i < buf.length && buf[i] === 0; i++) digits.push(0);
                    return digits.reverse().map(d => A[d]).join('');
                }
            };
        })();
    </script>

    <script>
        let currentMode = 'v1';
        let currentLang = 'english';

        const saltEl       = document.getElementById('salt');
        const pepperEl     = document.getElementById('pepper');
        const mnemonicEl   = document.getElementById('mnemonic');
        const passphraseEl = document.getElementById('passphrase');
        const langSelect   = document.getElementById('lang-select');
        const langStatus   = document.getElementById('lang-status');
        const wordCount    = document.getElementById('word-count');
        const btn          = document.getElementById('btn');
        const btnGen       = document.getElementById('btn-gen');
        const btnValidate  = document.getElementById('btn-validate');
        const statusEl     = document.getElementById('status');
        const outEl        = document.getElementById('out');
        const g1El         = document.getElementById('g1_pub');
        const g1v2El       = document.getElementById('g1_v2_pub');
        const ipnsEl       = document.getElementById('ipns_key');
        const debugEl      = document.getElementById('debugLog');
        const debugLines   = [];

        function debugLog(msg) {
            debugLines.push(msg);
            if (debugEl) debugEl.textContent = debugLines.join('\n');
            console.log(msg);
        }

        function setLangStatus(state, msg) {
            langStatus.textContent = msg;
            langStatus.className = 'lang-status ' + state;
        }

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            let tabIndex = 0;
            if (mode === 'v2') tabIndex = 1;
            else if (mode === 'live') tabIndex = 2;
            
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
            document.getElementById('tab-' + mode).classList.add('active');
            statusEl.style.display = 'none';
            outEl.style.display = 'none';
            
            if (mode === 'live') {
                btn.style.display = 'none';
                document.getElementById('live-input').focus();
            } else {
                btn.style.display = 'block';
            }
        }

        async function onLangChange(lang) {
            currentLang = lang;
            setLangStatus('loading', 'loading…');
            try {
                await bip39.init(lang);
                setLangStatus('ok', '✓ ready');
            } catch(e) {
                setLangStatus('error', '✗ load failed');
                debugLog('Wordlist error: ' + e.message);
            }
        }

        function toBase36(uint8array) {
            const alphabet = '0123456789abcdefghijklmnopqrstuvwxyz';
            let value = 0n;
            for (const byte of uint8array) value = (value << 8n) + BigInt(byte);
            let output = '';
            while (value > 0n) {
                output = alphabet[Number(value % 36n)] + output;
                value /= 36n;
            }
            return output || '0';
        }

        // ── V1: Scrypt ───────────────────────────────────────────────────────
        const N = 4096, r = 16, p = 1, dkLen = 32;
        
        // Calcul de la mémoire consommée par Scrypt
        // Formule approximative : 128 * N * r * p octets
        const scryptMemoryBytes = 128 * N * r * p;
        const scryptMemoryMB = (scryptMemoryBytes / (1024 * 1024)).toFixed(2);

        function scryptPromise(password, salt) {
            return new Promise((resolve, reject) => {
                if (typeof scrypt === 'undefined') return reject(new Error('scrypt.min.js missing'));
                try {
                    const res = scrypt.scrypt(password, salt, N, r, p, dkLen);
                    if (res instanceof Promise) {
                        res.then(k => resolve(new Uint8Array(k))).catch(reject);
                    } else {
                        scrypt.scrypt(password, salt, N, r, p, dkLen, (e, k) => e ? reject(e) : resolve(new Uint8Array(k)));
                    }
                } catch(e) {
                    try { scrypt(password, salt, N, r, p, dkLen, (e, k) => e ? reject(e) : resolve(new Uint8Array(k))); }
                    catch(e2) { reject(e2); }
                }
            });
        }

        // ── MAIN DERIVE ──────────────────────────────────────────────────────
        async function derive(forceSalt = null, forcePepper = null) {
            const NostrLib = window.NostrTools || window.Nostr;
            if (!NostrLib) { alert('ERREUR: nostr.bundle.js manquant'); return; }
            if (typeof nacl === 'undefined') { alert('ERREUR: nacl-fast.min.js manquant'); return; }

            btn.disabled = true;
            statusEl.style.display = 'block';
            statusEl.innerHTML = 'Computing…';
            statusEl.className = 'result';
            outEl.style.display = 'none';
            debugLines.length = 0;
            debugEl.textContent = '';

            try {
                let seed; // 32 bytes Uint8Array

                if (currentMode === 'v1' || currentMode === 'live') {
                    let salt, pepper;
                    if (currentMode === 'live') {
                        salt = forceSalt || '';
                        pepper = forcePepper || '';
                        if (!salt && !pepper) throw new Error('Please type something');
                    } else {
                        salt   = (saltEl.value || '').trim();
                        pepper = pepperEl.value || '';
                        if (!salt || !pepper) throw new Error('Please enter login and password');
                    }
                    
                    const startTime = performance.now();
                    debugLog('Mode ' + currentMode + ': Scrypt derivation… (N=' + N + ', r=' + r + ', p=' + p + ')');
                    debugLog('Estimated memory usage: ~' + scryptMemoryMB + ' MB');
                    
                    seed = await scryptPromise(new TextEncoder().encode(pepper), new TextEncoder().encode(salt));
                    
                    const endTime = performance.now();
                    const duration = (endTime - startTime).toFixed(0);
                    debugLog('Scrypt computation finished in ' + duration + ' ms');

                } else {
                    // ── MODE V2: Mnemonic ──────────────────────────────────
                    if (typeof bip39 === 'undefined') throw new Error('bip39-libs.js not loaded');

                    const mnemonic   = (mnemonicEl.value || '').trim();
                    const passphrase = passphraseEl.value || '';
                    if (!mnemonic) throw new Error('Please enter a mnemonic phrase');

                    debugLog('Mode V2: Validating mnemonic…');
                    const valid = await bip39.validateMnemonic(mnemonic, currentLang);
                    if (!valid) throw new Error('Invalid mnemonic phrase (checksum failed or wrong language)');

                    debugLog('Mode V2: BIP39 PBKDF2 derivation…');

                    // *** KEY FIX: mnemonicToSeedHex is ASYNC — must await ***
                    const seedHex = await bip39.mnemonicToSeedHex(mnemonic, passphrase);

                    // Convert hex → bytes (64 bytes), take first 32 for Ed25519
                    const rawSeed = new Uint8Array(seedHex.length / 2);
                    for (let i = 0; i < rawSeed.length; i++)
                        rawSeed[i] = parseInt(seedHex.substr(i * 2, 2), 16);

                    seed = rawSeed.slice(0, 32);
                    debugLog('Seed (32 bytes) computed. seedHex length: ' + seedHex.length);
                }

                // ── Ed25519 Keys (G1 / IPNS) ─────────────────────────────
                const edKeyPair  = nacl.sign.keyPair.fromSeed(seed);
                const pubKeyBytes = edKeyPair.publicKey;

                g1El.value  = window.bs58.encode(pubKeyBytes);

                // ── Duniter v2 SS58 Address ──────────────────────────────
                const SS58_PREFIX = 4450;
                const first = ((SS58_PREFIX & 0xFC) >> 2) | 0x40;
                const second = (SS58_PREFIX >> 8) | ((SS58_PREFIX & 0x03) << 6);
                const payload = new Uint8Array(2 + pubKeyBytes.length);
                payload[0] = first;
                payload[1] = second;
                payload.set(pubKeyBytes, 2);
                
                const prefixBytes = new TextEncoder().encode('SS58PRE');
                const checksumInput = new Uint8Array(prefixBytes.length + payload.length);
                checksumInput.set(prefixBytes, 0);
                checksumInput.set(payload, prefixBytes.length);
                
                const checksum = window.blake2b.blake2b(checksumInput, null, 64).slice(0, 2);
                
                const ss58Bytes = new Uint8Array(payload.length + checksum.length);
                ss58Bytes.set(payload, 0);
                ss58Bytes.set(checksum, payload.length);
                
                g1v2El.value = window.bs58.encode(ss58Bytes);

                const header    = new Uint8Array([0x01, 0x72, 0x00, 0x24, 0x08, 0x01, 0x12, 0x20]);
                const ipnsBuf   = new Uint8Array(header.length + pubKeyBytes.length);
                ipnsBuf.set(header);
                ipnsBuf.set(pubKeyBytes, header.length);
                ipnsEl.value = 'k' + toBase36(ipnsBuf);

                // ── Nostr Keys (secp256k1) ────────────────────────────────
                const privKeyBuf   = await crypto.subtle.digest('SHA-256', seed);
                const privKeyBytes = new Uint8Array(privKeyBuf);
                const privHex      = Array.from(privKeyBytes).map(b => ('0' + b.toString(16)).slice(-2)).join('');

                let pubHex, nsec, npub;
                pubHex = NostrLib.getPublicKey ? NostrLib.getPublicKey(privHex) : NostrLib.getPublicKey(privKeyBytes);
                if (NostrLib.nip19) {
                    nsec = NostrLib.nip19.nsecEncode(privHex);
                    npub = NostrLib.nip19.npubEncode(pubHex);
                }

                statusEl.innerHTML = '<span class="success">✓ Keys generated successfully!</span>';
                outEl.style.display = 'block';
                
                let extensionLink = '';
                const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
                if (isFirefox) {
                    extensionLink = '<p style="font-size: 0.85rem; margin-bottom: 1rem; background: rgba(56, 189, 248, 0.1); padding: 0.75rem; border-radius: 6px; border: 1px solid rgba(56, 189, 248, 0.2);">🦊 <a href="https://addons.mozilla.org/fr/firefox/addon/nos2x-fox/" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">Installer l\'extension nos2x-fox pour Firefox</a></p>';
                } else {
                    extensionLink = '<p style="font-size: 0.85rem; margin-bottom: 1rem; background: rgba(56, 189, 248, 0.1); padding: 0.75rem; border-radius: 6px; border: 1px solid rgba(56, 189, 248, 0.2);">🧩 <a href="https://chromewebstore.google.com/detail/nos2x/kpgefcfmnafjgpblomihpgmejjdanjjp" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">Installer l\'extension nos2x pour Chrome/Brave</a></p>';
                }

                outEl.innerHTML = extensionLink +
                    '<h3>Nostr nsec (Private Key)</h3><pre style="cursor: pointer; border-left: 4px solid var(--error);" onclick="copyNsec(this, \'' + (nsec || privHex) + '\')" title="Cliquez pour copier et ouvrir Coracle">' + (nsec || privHex) + '</pre>' +
                    '<h3>Nostr npub (Public Key)</h3><pre style="border-left: 4px solid var(--success);">' + (npub || pubHex) + '</pre>';

                // Show app selector
                document.getElementById('app-selector').style.display = 'block';

            } catch(e) {
                console.error(e);
                statusEl.innerHTML = '<span class="error">Error: ' + (e.message || e) + '</span>';
            } finally {
                btn.disabled = false;
            }
        }

        // ── Generate mnemonic ────────────────────────────────────────────────
        btnGen.addEventListener('click', async () => {
            if (typeof bip39 === 'undefined') { alert('BIP39 lib not loaded'); return; }
            btnGen.disabled = true;
            try {
                setLangStatus('loading', 'loading…');
                const strength = parseInt(wordCount.value, 10);
                const mn = await bip39.generateMnemonic(strength, currentLang);
                mnemonicEl.value = mn;
                setLangStatus('ok', '✓ ready');
                statusEl.style.display = 'block';
                statusEl.innerHTML = 'New mnemonic generated (' + mn.split(' ').length + ' words, ' + currentLang + ').';
                statusEl.className = 'result';
            } catch(e) {
                setLangStatus('error', '✗ failed');
                statusEl.style.display = 'block';
                statusEl.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
                statusEl.className = 'result';
            } finally {
                btnGen.disabled = false;
            }
        });

        // ── Validate ─────────────────────────────────────────────────────────
        btnValidate.addEventListener('click', async () => {
            const mnemonic = (mnemonicEl.value || '').trim();
            if (!mnemonic) return;
            btnValidate.disabled = true;
            try {
                const valid = await bip39.validateMnemonic(mnemonic, currentLang);
                statusEl.style.display = 'block';
                statusEl.className = 'result';
                statusEl.innerHTML = valid
                    ? '<span class="success">✓ Valid mnemonic</span>'
                    : '<span class="error">✗ Invalid mnemonic (bad checksum or wrong language)</span>';
            } catch(e) {
                statusEl.style.display = 'block';
                statusEl.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            } finally {
                btnValidate.disabled = false;
            }
        });

        btn.addEventListener('click', derive);

        // ── Copy nsec & Open Coracle ─────────────────────────────────────────
        function copyNsec(el, nsec) {
            navigator.clipboard.writeText(nsec).then(() => {
                const originalText = el.innerText;
                el.innerText = '✓ Copié dans le presse-papier !';
                el.style.color = '#6a6';
                setTimeout(() => {
                    el.innerText = originalText;
                    el.style.color = '#fff';
                }, 2000);
                
                // Afficher la frame d'explication et ouvrir Coracle
                showNostrConnectFrame();
            }).catch(err => {
                console.error('Erreur lors de la copie :', err);
                alert('Erreur lors de la copie du nsec.');
            });
        }

        function showNostrConnectFrame() {
            // Créer l'overlay
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            overlay.style.zIndex = '9999';
            overlay.style.display = 'flex';
            overlay.style.flexDirection = 'column';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.padding = '2rem';

            // Créer la boîte de dialogue
            const dialog = document.createElement('div');
            dialog.style.backgroundColor = 'var(--panel-bg)';
            dialog.style.padding = '2.5rem';
            dialog.style.borderRadius = '16px';
            dialog.style.border = '1px solid var(--border)';
            dialog.style.maxWidth = '90%';
            dialog.style.width = '600px';
            dialog.style.textAlign = 'center';
            dialog.style.boxShadow = '0 25px 50px -12px rgba(0,0,0,0.5)';
            dialog.style.maxHeight = '90vh';
            dialog.style.overflowY = 'auto';

            dialog.innerHTML = `
                <h2 style="color: var(--text-main); margin-top: 0; font-size: 1.5rem;">🔑 Activer Nostr Connect</h2>
                <p style="color: var(--text-muted); text-align: left; line-height: 1.6; font-size: 1.05rem;">
                    Votre clé privée (nsec) a été copiée dans le presse-papier.
                </p>
                <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 8px; margin: 1.5rem 0;">
                    <ol style="color: var(--text-main); text-align: left; line-height: 1.6; margin: 0; padding-left: 1.2rem;">
                        <li style="margin-bottom: 0.5rem;">Ouvrez l'extension <strong>nos2x</strong> (ou <strong>nos2x-fox</strong>) que vous venez d'installer.</li>
                        <li style="margin-bottom: 0.5rem;">Allez dans les <strong>Options</strong> ou <strong>Paramètres</strong> de l'extension.</li>
                        <li style="margin-bottom: 0.5rem;">Collez votre clé privée (nsec) dans le champ prévu à cet effet.</li>
                        <li>Enregistrez. L'extension gérera désormais vos signatures de manière sécurisée.</li>
                    </ol>
                </div>
                <p style="color: var(--text-muted); text-align: left; line-height: 1.6; margin-bottom: 2rem;">
                    Une fois cela fait, vous pourrez vous connecter aux applications en utilisant l'extension (Nostr Connect / NIP-07).
                </p>
                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <button id="btn-open-coracle" style="background: var(--accent); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; flex: 1; min-width: 150px;">
                        Ouvrir Coracle
                    </button>
                    <button id="btn-open-uplanet" style="background: var(--ipfs-color); color: #000; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; flex: 1; min-width: 150px;">
                        Ouvrir UPlanet
                    </button>
                </div>
                <button id="btn-close-dialog" style="background: transparent; color: var(--text-muted); border: none; padding: 0.75rem 1.5rem; margin-top: 1.5rem; cursor: pointer; text-decoration: underline; font-size: 0.9rem;">
                    Fermer
                </button>
            `;

            overlay.appendChild(dialog);
            document.body.appendChild(overlay);

            document.getElementById('btn-open-coracle').addEventListener('click', () => {
                window.open('/ipns/coracle.copylaradio.com', '_blank');
                document.body.removeChild(overlay);
            });

            document.getElementById('btn-open-uplanet').addEventListener('click', () => {
                window.open('https://u.copylaradio.com/g1', '_blank');
                document.body.removeChild(overlay);
            });

            document.getElementById('btn-close-dialog').addEventListener('click', () => {
                document.body.removeChild(overlay);
            });
        }

        // ── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('load', async () => {
            debugLog('Ready. Mode: ' + currentMode);
            if (typeof bip39 !== 'undefined') {
                debugLog('BIP39 lib loaded, loading English wordlist…');
                setLangStatus('loading', 'loading…');
                try {
                    await bip39.init('english');
                    setLangStatus('ok', '✓ ready');
                    debugLog('BIP39 English wordlist OK (' + bip39.WORDLISTS.english.length + ' words)');
                } catch(e) {
                    setLangStatus('error', '✗ load failed');
                    debugLog('BIP39 init failed: ' + e.message);
                }
            } else {
                debugLog('WARNING: BIP39 lib MISSING');
                setLangStatus('error', '✗ missing');
            }
        });
    </script>
</body>
</html>
