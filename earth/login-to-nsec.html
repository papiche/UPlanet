<body>
    <h1>Login/Pass → Universal Keygen</h1>
    <p class="subtitle">Derives keys for Nostr, Duniter (Ğ1) and IPFS (IPNS) from a single Scrypt seed.</p>

    <div class="warning">
        Use only on a trusted device. Credentials are processed locally in memory.
    </div>

    <label for="salt">Salt (login / username)</label>
    <input type="text" id="salt" placeholder="e.g. mylogin or UPLANETNAME+LAT" autocomplete="username">

    <label for="pepper">Pepper (password)</label>

    <div id="status" class="result" style="display: none;"></div>

            <label>Ğ1 Public Key (Duniter v1):</label>
            <input type="text" id="g1_pub" readonly placeholder="..." />
        </div>

        <div class="key-block ipfs-key">
            <label>IPNS Name (IPFS Peer ID - k51...):</label>
            <input type="text" id="ipns_key" readonly placeholder="..." />
        </div>
    </div>

        function toBase36(uint8array) {
            const alphabet = '0123456789abcdefghijklmnopqrstuvwxyz';
            let value = 0n;
            for (const byte of uint8array) {
                value = (value << 8n) + BigInt(byte);
            }
            let output = '';
            while (value > 0n) {
                output = alphabet[Number(value % 36n)] + output;
                value /= 36n;
            }
            // Gestion des zéros initiaux (pour Base36 standard, '0' est le char 0)
            // Note: Pour les CIDs IPFS, l'encodage se fait sur le nombre global, 
            // mais on ajoute souvent un padding si nécessaire. Ici implementation simple.
            // Si le résultat est vide (input=0), on met '0'
            return output || '0';
        }

        function scryptPromise(password, salt, N, r, p, dkLen) {
            return new Promise(function (resolve, reject) {
                if (typeof scrypt !== 'undefined' && scrypt.scrypt) {
                    scrypt.scrypt(password, salt, N, r, p, dkLen).then(function (key) {
                        resolve(new Uint8Array(key));
                    }).catch(reject);
                    return;
                }
                scrypt(password, salt, N, r, p, dkLen, function (err, key) {
                    if (err) reject(err);
                    else resolve(new Uint8Array(key));
                });
            });
        }

        function sha256Bytes(data) {
            return crypto.subtle.digest('SHA-256', data).then(function (buf) {
                return new Uint8Array(buf);
            });

        function bytesToHex(bytes) {
            return Array.from(bytes).map(function (b) {
                return ('0' + b.toString(16)).slice(-2);
            }).join('');

        function hexToBytes(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < bytes.length; i++) {
                bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
            }
            return bytes;
        }
