<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ MULTIPASS — Historique ẑen</title>
<style>
:root{
    --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;
    --green:#86efac;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
    --purple:#c084fc;--text:#e6edf3;--muted:#8b949e;
    --card-bg:rgba(22,27,34,0.95);--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
     min-height:100vh;padding:64px 20px 32px}

/* ── Header ── */
.pg-header{text-align:center;padding:24px 12px 18px;max-width:900px;margin:0 auto}
.pg-header h1{font-size:1.8rem;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.pg-sub{color:var(--muted);font-size:.88rem}

/* ── Identity ── */
.id-block{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
    padding:16px 20px;max-width:900px;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.id-email{font-size:1rem;font-weight:600;color:var(--green)}
.id-g1pub{font-size:.7rem;color:var(--muted);font-family:monospace;word-break:break-all;margin-top:2px}
.id-links{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:.78rem;padding:3px 12px;border-radius:20px;border:1px solid;cursor:pointer;
      text-decoration:none;white-space:nowrap;display:inline-block}
.pill-blue{border-color:rgba(96,165,250,.3);color:var(--blue);background:rgba(96,165,250,.08)}
.pill-blue:hover{background:rgba(96,165,250,.18)}
.pill-green{border-color:rgba(134,239,172,.3);color:var(--green);background:rgba(134,239,172,.08)}
.pill-green:hover{background:rgba(134,239,172,.18)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;
    max-width:900px;margin:0 auto 18px}
.stat{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
    padding:12px 16px;text-align:center}
.stat .v{font-size:1.5rem;font-weight:700;line-height:1}
.stat .l{font-size:.68rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.c-green .v{color:var(--green)}  .c-red .v{color:var(--red)}
.c-blue  .v{color:var(--blue)}   .c-yellow .v{color:var(--yellow)}

/* ── Toolbar ── */
.toolbar{max-width:900px;margin:0 auto 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{padding:4px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);
    color:var(--muted);font-size:.78rem;cursor:pointer}
.fb.on{border-color:var(--blue);background:rgba(96,165,250,.12);color:var(--blue)}
.fb.on.g{border-color:var(--green);background:rgba(134,239,172,.12);color:var(--green)}
.fb.on.r{border-color:var(--red);background:rgba(248,113,113,.12);color:var(--red)}
.fb.on.p{border-color:var(--purple);background:rgba(192,132,252,.12);color:var(--purple)}
.sort-sep{margin-left:auto;font-size:.75rem;color:var(--muted)}

/* ── Section label ── */
.sec{max-width:900px;margin:0 auto 10px;font-size:.82rem;font-weight:600;
     color:var(--muted);text-transform:uppercase;letter-spacing:.7px;
     display:flex;align-items:center;gap:8px}

/* ── TX list ── */
.txlist{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:7px}
.tx{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
    padding:12px 16px;display:grid;grid-template-columns:28px 1fr auto;gap:8px 12px;
    align-items:center;transition:border-color .15s}
.tx:hover{border-color:rgba(96,165,250,.25)}
.tx.rcv{border-left:3px solid rgba(134,239,172,.45)}
.tx.snt{border-left:3px solid rgba(248,113,113,.35)}
.tx-ico{font-size:1.1rem;text-align:center}
.tx-peer{font-size:.74rem;font-family:monospace;color:var(--muted);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-ref{font-size:.71rem;color:rgba(255,255,255,.32);margin-top:1px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-date{font-size:.69rem;color:var(--muted);margin-top:2px}
.tx-amt{text-align:right;white-space:nowrap}
.tx-zen{font-size:1.15rem;font-weight:700}
.tx-zen.pos{color:var(--green)}  .tx-zen.neg{color:var(--red)}
.tx-g1{font-size:.68rem;color:var(--muted);margin-top:1px}

/* ── Misc ── */
.empty{max-width:900px;margin:36px auto;text-align:center;
    background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:40px 20px}
.loading{max-width:900px;margin:50px auto;text-align:center;color:var(--muted)}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);
    border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.rfbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
    background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:18px;color:var(--muted);font-size:.74rem;cursor:pointer;text-decoration:none}
.rfbtn:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}

/* ── Landing ── */
.landing{max-width:480px;margin:60px auto;background:var(--card-bg);border:1px solid var(--border);
    border-radius:var(--r);padding:28px}
.landing h2{font-size:.95rem;font-weight:600;margin-bottom:8px}
.landing p{font-size:.83rem;color:var(--muted);margin-bottom:14px;line-height:1.6}
.inp-row{display:flex;gap:8px}
.inp-row input{flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:.88rem;outline:none}
.inp-row input:focus{border-color:var(--blue)}
.inp-row button{padding:9px 16px;background:rgba(96,165,250,.18);border:1px solid var(--blue);
    border-radius:8px;color:var(--blue);font-size:.88rem;font-weight:600;cursor:pointer}
.inp-row button:hover{background:rgba(96,165,250,.3)}
</style>
</head>
<body>

<div class="pg-header">
    <div style="font-size:2rem;margin-bottom:8px">⚡</div>
    <h1>MULTIPASS</h1>
    <div class="pg-sub" id="pg-sub">Historique des transactions ẑen</div>
</div>

<div id="root"><div class="loading"><div class="spin"></div><br>Initialisation…</div></div>

<script>
/* ═══════════════════════════════════════
   Helpers
   ═══════════════════════════════════════ */
function apiBase() {
    if (typeof window.getAPIUrl === 'function') return window.getAPIUrl();
    var h = location.hostname, p = location.port, pr = location.protocol.replace(':','');
    if ((h==='127.0.0.1'||h==='localhost') && (p==='8080'||p==='54321'||p==='7777'))
        return 'http://127.0.0.1:54321';
    if (h.startsWith('ipfs.'))  return pr+'://u.'+h.slice(5);
    if (h.startsWith('u.'))     return pr+'://u.'+h.slice(2);
    if (h.startsWith('relay.')) return pr+'://u.'+h.slice(6);
    return 'https://u.copylaradio.com';
}
var API = apiBase();

function g1ToZen(g1) { return Math.round(Math.abs(parseFloat(g1)||0) * 10 * 10) / 10; }

function fmtDate(iso) {
    if (!iso) return '—';
    try {
        var d = new Date(iso);
        return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})
             + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    } catch(e) { return iso.split('T')[0]; }
}

function trunc(s) {
    if (!s) return '—';
    if (s.length <= 22) return s;
    return s.slice(0,12)+'…'+s.slice(-6);
}

/* ═══════════════════════════════════════
   State
   ═══════════════════════════════════════ */
var S = { txAll:[], filter:'all', sort:'date', email:'', g1pub:'' };

/* ═══════════════════════════════════════
   Render
   ═══════════════════════════════════════ */
function render() {
    var txView = S.txAll.filter(function(t){
        return S.filter==='all' || t.direction===S.filter;
    });
    if (S.sort === 'amount') {
        txView = txView.slice().sort(function(a,b){
            return Math.abs(b['Amounts Ğ1']) - Math.abs(a['Amounts Ğ1']);
        });
    }

    var totRcv = 0, totSnt = 0;
    S.txAll.forEach(function(t){
        if (t.direction==='received') totRcv += Math.abs(t['Amounts Ğ1']);
        else                          totSnt += Math.abs(t['Amounts Ğ1']);
    });
    var net = totRcv - totSnt;

    var statsEl = document.getElementById('mp-stats');
    if (statsEl) statsEl.innerHTML =
        '<div class="stat c-green"><div class="v">Ẑ '+g1ToZen(totRcv).toFixed(1)+'</div><div class="l">Reçu total</div></div>'
       +'<div class="stat c-red"><div class="v">Ẑ '+g1ToZen(totSnt).toFixed(1)+'</div><div class="l">Envoyé total</div></div>'
       +'<div class="stat '+(net>=0?'c-blue':'c-yellow')+'"><div class="v">Ẑ '+g1ToZen(Math.abs(net)).toFixed(1)+'</div><div class="l">Net</div></div>'
       +'<div class="stat c-yellow"><div class="v">'+S.txAll.length+'</div><div class="l">Transactions</div></div>';

    var tbEl = document.getElementById('mp-toolbar');
    if (tbEl) tbEl.innerHTML =
        '<button class="fb'+(S.filter==='all'?' on':'')+'" onclick="setF(\'all\')">Toutes</button>'
       +'<button class="fb'+(S.filter==='received'?' on g':'')+'" onclick="setF(\'received\')">↓ Reçues</button>'
       +'<button class="fb'+(S.filter==='sent'?' on r':'')+'" onclick="setF(\'sent\')">↑ Envoyées</button>'
       +'<span class="sort-sep">Trier :</span>'
       +'<button class="fb'+(S.sort==='date'?' on p':'')+'" onclick="setSort(\'date\')">Date</button>'
       +'<button class="fb'+(S.sort==='amount'?' on p':'')+'" onclick="setSort(\'amount\')">Montant</button>';

    var listEl = document.getElementById('mp-list');
    if (!listEl) return;

    if (txView.length === 0) {
        listEl.innerHTML = '<div class="empty"><div style="font-size:1.8rem;margin-bottom:10px">📭</div>'
            +'<div style="color:var(--muted)">Aucune transaction dans ce filtre</div></div>';
        return;
    }

    var html = '';
    txView.forEach(function(tx) {
        var rcv  = tx.direction === 'received';
        var g1a  = Math.abs(tx['Amounts Ğ1']);
        var zen  = g1ToZen(g1a);
        var ref  = (tx['Reference']||'').trim();
        html +=
            '<div class="tx '+(rcv?'rcv':'snt')+'">'
           +'<div class="tx-ico">'+(rcv?'⬇':'⬆')+'</div>'
           +'<div>'
           +'<div class="tx-peer" title="'+(tx['Issuers/Recipients']||'')+'">'
                +trunc(tx['Issuers/Recipients'])+'</div>'
           +(ref?'<div class="tx-ref">'+ref+'</div>':'')
           +'<div class="tx-date">'+fmtDate(tx['Date'])+'</div>'
           +'</div>'
           +'<div class="tx-amt">'
           +'<div class="tx-zen '+(rcv?'pos':'neg')+'">'+(rcv?'+':'−')+' Ẑ '+zen.toFixed(1)+'</div>'
           +'<div class="tx-g1">'+(rcv?'+':'−')+' '+g1a.toFixed(2)+' Ğ1</div>'
           +'</div>'
           +'</div>';
    });
    listEl.innerHTML = html;
}

function setF(f)    { S.filter=f; render(); }
function setSort(s) { S.sort=s;   render(); }

/* ═══════════════════════════════════════
   Load history
   ═══════════════════════════════════════ */
async function loadHistory(identifier) {
    document.getElementById('root').innerHTML =
        '<div class="loading"><div class="spin"></div><br>Chargement de l\'historique…<br>'
       +'<small style="color:var(--muted)">Requête blockchain Duniter v2…</small></div>';

    try {
        var url = API + '/check_g1history?g1pub=' + encodeURIComponent(identifier);
        var r = await fetch(url, { signal: AbortSignal.timeout(25000) });
        if (!r.ok) {
            var err = await r.json().catch(function(){ return {detail:'Erreur réseau HTTP '+r.status}; });
            throw new Error(err.detail || 'HTTP ' + r.status);
        }
        var data = await r.json();

        var history = data.history || [];
        var g1pub   = data.g1pub || identifier;
        S.g1pub = g1pub;

        /* Masquer la dernière transaction (PAF initial UPlanet → origine révélée) */
        if (history.length > 0 && history[history.length-1].direction === 'received') {
            history = history.slice(0, -1);
        }
        S.txAll = history;

        /* Récupère le solde actuel */
        var zenBal = null;
        try {
            var rb = await fetch(API + '/check_balance?g1pub=' + encodeURIComponent(g1pub),
                { signal: AbortSignal.timeout(8000) });
            if (rb.ok) {
                var bd = await rb.json();
                zenBal = (bd.zen !== undefined) ? bd.zen : null;
            }
        } catch(e) {}

        if (zenBal !== null) {
            document.getElementById('pg-sub').textContent =
                'Solde : Ẑ ' + parseFloat(zenBal).toFixed(1) + '  ·  Historique transactions';
        }

        /* Liens Cesium et ZenCard */
        var cesiumUrl = 'https://g1.duniter.fr/#/app/wot/' + encodeURIComponent(g1pub) + '/';
        var zcUrl = S.email
            ? 'zencard.html?email=' + encodeURIComponent(S.email)
            : '';

        /* Construire la page */
        document.getElementById('root').innerHTML =
            '<div class="id-block">'
           +'<div><div class="id-email">'+(S.email || g1pub)+'</div>'
           +'<div class="id-g1pub">'+g1pub+'</div></div>'
           +'<div class="id-links">'
           +(zcUrl ? '<a class="pill pill-green" href="'+zcUrl+'" title="Investissements coopératifs ẐEN">💳 ZenCard</a>' : '')
           +'<a class="pill pill-blue" href="'+cesiumUrl+'" target="_blank">🔍 Cesium+</a>'
           +'</div>'
           +'</div>'
           +'<div class="stats" id="mp-stats"></div>'
           +'<div class="toolbar" id="mp-toolbar"></div>'
           +'<div class="sec">📑 Transactions ('
           +'<span id="mp-count">'+history.length+'</span>)'
           +'  <a class="rfbtn" href="#" onclick="event.preventDefault();reload()">↻ Actualiser</a>'
           +'  <a class="rfbtn" href="multipass.html">← Accueil</a>'
           +'</div>'
           +'<div class="txlist" id="mp-list"></div>';

        render();

    } catch(e) {
        document.getElementById('root').innerHTML =
            '<div class="empty">'
           +'<div style="font-size:1.8rem;margin-bottom:10px">⚠️</div>'
           +'<div style="color:var(--muted);margin-bottom:6px">Impossible de charger l\'historique</div>'
           +'<div style="font-size:.8rem;color:var(--muted)">'+e.message+'</div>'
           +'<div style="margin-top:14px"><a href="multipass.html">← Retour</a></div>'
           +'</div>';
    }
}

function reload() {
    if (S.g1pub) loadHistory(S.g1pub);
    else loadHistory(S.email || (new URLSearchParams(location.search).get('email')));
}

/* ═══════════════════════════════════════
   Landing
   ═══════════════════════════════════════ */
function showLanding() {
    document.getElementById('pg-sub').textContent = 'Historique des transactions ẑen';
    document.getElementById('root').innerHTML =
        '<div class="landing">'
       +'<h2>🔍 Consulter un MULTIPASS</h2>'
       +'<p>Entrez votre email ou une clé G1 pour afficher l\'historique des transactions ẑen (blockchain Duniter v2).</p>'
       +'<div class="inp-row">'
       +'<input type="email" id="mp-inp" placeholder="email@example.com" autofocus>'
       +'<button onclick="submitInput()">Voir →</button>'
       +'</div>'
       +'</div>';
    setTimeout(function(){
        var i = document.getElementById('mp-inp');
        if (i) i.addEventListener('keydown', function(e){ if(e.key==='Enter') submitInput(); });
    }, 30);
}

function submitInput() {
    var v = (document.getElementById('mp-inp') || {}).value || '';
    v = v.trim();
    if (!v) return;
    var u = new URL(location.href);
    if (v.includes('@')) { S.email = v; u.searchParams.set('email', v); }
    else                 { S.g1pub = v; u.searchParams.set('g1pub', v); }
    history.replaceState({}, '', u);
    loadHistory(v);
}

/* ═══════════════════════════════════════
   Init
   ═══════════════════════════════════════ */
(function() {
    var p = new URLSearchParams(location.search);
    var email = p.get('email') || p.get('mail') || '';
    var g1pub = p.get('g1pub') || '';
    S.email = email;
    S.g1pub = g1pub;

    if (g1pub) {
        /* g1pub direct dans URL → charge immédiatement */
        loadHistory(g1pub);
    } else if (email) {
        /* email → le backend résout le g1pub */
        loadHistory(email);
    } else {
        /* Rien dans l'URL → attendre le header ou montrer landing */
        showLanding();
        /* Si le header a déjà le g1pub en mémoire */
        var waitHdr = setInterval(function() {
            if (window._uphG1Pub) {
                clearInterval(waitHdr);
                S.g1pub = window._uphG1Pub;
                S.email = window._uphEmail || '';
                if (S.email) {
                    var u = new URL(location.href);
                    u.searchParams.set('email', S.email);
                    u.searchParams.set('g1pub', S.g1pub);
                    history.replaceState({}, '', u);
                }
                loadHistory(S.g1pub);
            }
        }, 400);
        setTimeout(function(){ clearInterval(waitHdr); }, 8000);
    }
})();
</script>
<script src="nacl-fast.min.js"></script>
<script src="nostr.bundle.js"></script>
<script src="common.js"></script>
<script src="uplanet-header.js"></script>
</body>
</html>
