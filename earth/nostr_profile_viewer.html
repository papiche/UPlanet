<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIPASS</title>
    <link rel="stylesheet" href="nostr_profile_viewer.css">
    <!-- nostr.bundle.js exposes NostrTools (used by nostr_profile_viewer.js and common.js) -->
    <script src="nostr.bundle.js"></script>
    <!-- common.js: detectUSPOTAPI, ExtensionWrapper, RelayManager, fetchUserFollowList, etc. -->
    <script src="common.js"></script>
    <script src="feedback.js"></script>
</head>
<body>
    <!-- Matrix rain background -->
    <canvas id="matrix" class="matrix-background"></canvas>

    <div class="terminal-container">
        <!-- Terminal window chrome -->
        <div class="terminal-header">
            <div class="terminal-buttons-group">
                <div class="terminal-button-ctrl red"    title="No previous profile"></div>
                <div class="terminal-button-ctrl yellow" title="No initial profile"></div>
                <div class="terminal-button-ctrl green"  title="No next profile"></div>
            </div>
            <div class="glitch" data-text="MULTIPASS:~"><a href="index.html">MULTIPASS:~</a></div>
            <div class="terminal-buttons-group">
                <div style="width:20px;"></div><!-- spacer -->
            </div>
        </div>

        <div class="terminal-body">

            <!-- ===== PROFILE SECTION ===== -->
            <div id="profile-container" class="profile loading">
                <div id="profile-content">loading profile...</div>
            </div>

            <!-- ===== FOLLOW / MUTE BUTTONS ===== -->
            <div id="follow-button-container">
                <div class="action-buttons">
                    <button id="follow-button">Follow</button>
                    <button id="mute-button" title="Mute this user (NIP-51 mute list)">Mute</button>
                </div>
                <div id="follow-error-message"></div>
            </div>

            <!-- ===== COOKIES (own profile only) ===== -->
            <div id="cookie-container" class="messages" style="display:none">
                <h2>🍪 Cookies chiffrés</h2>
                <div id="cookie-content" class="messages-scrollable">
                    <p style="color:var(--terminal-border)">Chargement…</p>
                </div>
            </div>

            <!-- ===== MESSAGES & ARTICLES ===== -->
            <div id="messages-container" class="messages loading">
                <h2>Messages &amp; Articles</h2>
                <div id="messages-content" class="messages-scrollable">loading messages...</div>
            </div>

            <!-- ===== MUTED PROFILES (NIP-51 kind 10000) ===== -->
            <div id="analytics-container" class="messages loading">
                <h2>Muted profiles (NIP-51)</h2>
                <div id="analytics-content" class="messages-scrollable">loading...</div>
            </div>

            <!-- ===== ZONE N1 : direct connections (follows / followers) ===== -->
            <!--
                Filters:
                  → P21  = accounts this profile FOLLOWS   (outgoing, kind 3 tags)
                  ↔ P2P  = MUTUAL follows (profile follows them AND they follow back)
                  ← 12P  = accounts that FOLLOW this profile but are NOT followed back
            -->
            <div id="n1-container" class="messages network-zone">
                <h2>🔗 Réseau N1
                    <span class="net-zone-count" id="n1-count"></span>
                </h2>
                <div class="network-filter-bar" id="n1-filter-bar">
                    <button class="net-filter-btn active"
                            data-zone="n1" data-filter="p21"
                            title="Profils que ce compte suit (→ P21)">→ P21</button>
                    <button class="net-filter-btn"
                            data-zone="n1" data-filter="p2p"
                            title="Follows mutuels (↔ P2P)">↔ P2P</button>
                    <button class="net-filter-btn"
                            data-zone="n1" data-filter="12p"
                            title="Comptes qui suivent ce profil mais non suivis en retour (← 12P)">← 12P</button>
                </div>
                <div id="n1-content" class="messages-scrollable">
                    <p style="color:var(--terminal-border);">En attente du chargement du profil…</p>
                </div>
            </div>

            <!-- ===== ZONE N2 : second-degree network (on demand) ===== -->
            <!--
                N2 = follows of follows (contacts of N1 contacts).
                Loaded on demand to avoid relay overload.
                Same P21 / P2P / 12P filters apply (approximated for N²).
            -->
            <div id="n2-container" class="messages network-zone">
                <h2>🌐 Réseau N2
                    <span class="net-zone-count" id="n2-count"></span>
                </h2>
                <div class="network-filter-bar" id="n2-filter-bar">
                    <button class="net-filter-btn active"
                            data-zone="n2" data-filter="p21"
                            title="Suivis des suivis (→ P21)">→ P21</button>
                    <button class="net-filter-btn"
                            data-zone="n2" data-filter="p2p"
                            title="Follows mutuels N² (↔ P2P)">↔ P2P</button>
                    <button class="net-filter-btn"
                            data-zone="n2" data-filter="12p"
                            title="Followers N² non mutuels (← 12P)">← 12P</button>
                </div>
                <div id="n2-content" class="messages-scrollable">
                    <button class="n2-load-btn" id="n2-load-btn" onclick="loadN2Zone()">
                        🌐 Charger le réseau N2 (follows des follows)
                    </button>
                </div>
            </div>

        </div><!-- /.terminal-body -->
    </div><!-- /.terminal-container -->

    <!--
        nostr_profile_viewer.js contains:
          - Matrix animation
          - URL/navigation management
          - Bech32 / nprofile decoders
          - fetchNostrProfile, fetchNostrMessages, fetchMuteListForProfile
          - displayNostrData (main rendering function)
          - Follow / Unfollow / Mute button handlers
          - N1 / N2 zone: fetchProfileFollowList, fetchProfileFollowers,
            computeNetworkSubset, renderNetworkPersonCard,
            loadN1Zone, displayN1Zone, loadN2Zone, displayN2Zone,
            followFromNetwork, unfollowFromNetwork, muteFromNetwork
    -->
    <script src="nostr_profile_viewer.js"></script>
    <script src="uplanet-header.js"></script>

<script>
// ── Cookie section (own profile only) ──────────────────────────────────────
(function () {
    'use strict';

    var _cookieLoaded = false;

    function _apiBase() {
        // Reuse getApiServerUrl() defined in nostr_profile_viewer.js
        if (typeof getApiServerUrl === 'function') return getApiServerUrl();
        var u = new URL(window.location.href);
        var h = u.hostname.replace(/^ipfs\./, 'u.');
        var p = u.port === '8080' ? '54321' : u.port;
        return p ? (u.protocol + '//' + h + ':' + p) : (u.protocol + '//' + h);
    }

    function _ageColor(days) {
        if (days === null || days === undefined) return '#888';
        if (days < 14) return '#2ecc71';
        if (days < 30) return '#f39c12';
        return '#e74c3c';
    }

    function _renderCookies(cookies, npub) {
        var el = document.getElementById('cookie-content');
        if (!el) return;
        if (!cookies || cookies.length === 0) {
            el.innerHTML = '<p style="color:var(--terminal-border)">Aucun cookie stocké. '
                + '<a href="/cookie.html" style="color:var(--terminal-cyan)">Uploader un cookie →</a></p>';
            return;
        }
        var sorted = cookies.slice().sort(function (a, b) {
            return (b.uploaded_at || '').localeCompare(a.uploaded_at || '');
        });
        var rows = sorted.map(function (c) {
            var age  = c.age_days !== null && c.age_days !== undefined ? c.age_days + 'j' : '?';
            var col  = _ageColor(c.age_days);
            var cid  = c.cid ? c.cid.slice(0, 14) + '…' : '—';
            var date = c.uploaded_at ? c.uploaded_at.slice(0, 10) : '?';
            return '<tr>'
                + '<td style="color:var(--terminal-cyan)">' + c.domain + '</td>'
                + '<td>' + date + '</td>'
                + '<td style="color:' + col + ';font-weight:700">' + age + '</td>'
                + '<td style="font-size:.75em;font-family:monospace;color:#666">' + cid + '</td>'
                + '<td><button data-domain="' + c.domain + '" class="cookie-del-btn" '
                + 'style="background:#e74c3c;color:#fff;border:none;padding:2px 7px;'
                + 'border-radius:4px;cursor:pointer;font-size:.8em">🗑️</button></td>'
                + '</tr>';
        }).join('');

        el.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:.9em">'
            + '<thead><tr style="color:var(--terminal-green)">'
            + '<th style="text-align:left;padding:4px 8px;border-bottom:1px solid #333">Domaine</th>'
            + '<th style="text-align:left;padding:4px 8px;border-bottom:1px solid #333">Uploadé</th>'
            + '<th style="text-align:left;padding:4px 8px;border-bottom:1px solid #333">Âge</th>'
            + '<th style="text-align:left;padding:4px 8px;border-bottom:1px solid #333">CID IPFS</th>'
            + '<th style="padding:4px 8px;border-bottom:1px solid #333"></th>'
            + '</tr></thead><tbody>' + rows + '</tbody></table>'
            + '<p style="margin-top:10px"><a href="/cookie.html" '
            + 'style="color:var(--terminal-cyan);font-size:.85em">+ Uploader un nouveau cookie</a></p>';

        // Delete buttons
        el.querySelectorAll('.cookie-del-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var domain = btn.getAttribute('data-domain');
                if (!confirm('Supprimer le cookie pour ' + domain + ' ?')) return;
                fetch(_apiBase() + '/cookie/' + domain + '?npub=' + encodeURIComponent(npub), {method: 'DELETE'})
                    .then(function (r) { return r.json(); })
                    .then(function (j) {
                        if (j.success) _loadCookies(npub, true);
                        else alert('Erreur: ' + (j.detail || JSON.stringify(j)));
                    })
                    .catch(function (e) { alert('Erreur réseau: ' + e); });
            });
        });
    }

    function _loadCookies(npub, force) {
        if (_cookieLoaded && !force) return;
        _cookieLoaded = true;
        var el = document.getElementById('cookie-content');
        if (el) el.innerHTML = '<p style="color:var(--terminal-border)">⏳ Chargement…</p>';

        fetch(_apiBase() + '/cookie?npub=' + encodeURIComponent(npub))
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (data) { _renderCookies(data.cookies || [], npub); })
            .catch(function (e) {
                if (el) el.innerHTML = '<p style="color:#e74c3c">Impossible de charger les cookies ('
                    + e.message + '). Vérifiez votre authentification NOSTR.</p>';
            });
    }

    // Called when a profile is displayed — show/hide the section
    window._updateCookieSection = function (viewedHex) {
        var myHex  = window.userPubkey || '';
        var myNpub = window.userNpub   || '';
        var box    = document.getElementById('cookie-container');
        if (!box) return;

        if (viewedHex && myHex && viewedHex === myHex && myNpub) {
            box.style.display = '';
            _loadCookies(myNpub, false);
        } else {
            box.style.display = 'none';
        }
    };
}());
</script>
</body>
</html>
