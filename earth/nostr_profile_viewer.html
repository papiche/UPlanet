<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIPASS</title>
    <link rel="stylesheet" href="nostr_profile_viewer.css">
    <!-- nostr.bundle.js exposes NostrTools (used by nostr_profile_viewer.js and common.js) -->
    <script src="nostr.bundle.js"></script>
    <!-- common.js: detectUSPOTAPI, ExtensionWrapper, RelayManager, fetchUserFollowList, etc. -->
    <script src="common.js"></script>
</head>
<body>
    <!-- Matrix rain background -->
    <canvas id="matrix" class="matrix-background"></canvas>

    <div class="terminal-container">
        <!-- Terminal window chrome -->
        <div class="terminal-header">
            <div class="terminal-buttons-group">
                <div class="terminal-button-ctrl red"    title="No previous profile"></div>
                <div class="terminal-button-ctrl yellow" title="No initial profile"></div>
                <div class="terminal-button-ctrl green"  title="No next profile"></div>
            </div>
            <div class="glitch" data-text="MULTIPASS:~">MULTIPASS:~</div>
            <div class="terminal-buttons-group">
                <div style="width:20px;"></div><!-- spacer -->
            </div>
        </div>

        <div class="terminal-body">

            <!-- ===== PROFILE SECTION ===== -->
            <div id="profile-container" class="profile loading">
                <div id="profile-content">loading profile...</div>
            </div>

            <!-- ===== FOLLOW / MUTE BUTTONS ===== -->
            <div id="follow-button-container">
                <div class="action-buttons">
                    <button id="follow-button">Follow</button>
                    <button id="mute-button" title="Mute this user (NIP-51 mute list)">Mute</button>
                </div>
                <div id="follow-error-message"></div>
            </div>

            <!-- ===== MESSAGES & ARTICLES ===== -->
            <div id="messages-container" class="messages loading">
                <h2>Messages &amp; Articles</h2>
                <div id="messages-content" class="messages-scrollable">loading messages...</div>
            </div>

            <!-- ===== MUTED PROFILES (NIP-51 kind 10000) ===== -->
            <div id="analytics-container" class="messages loading">
                <h2>Muted profiles (NIP-51)</h2>
                <div id="analytics-content" class="messages-scrollable">loading...</div>
            </div>

            <!-- ===== ZONE N1 : direct connections (follows / followers) ===== -->
            <!--
                Filters:
                  → P21  = accounts this profile FOLLOWS   (outgoing, kind 3 tags)
                  ↔ P2P  = MUTUAL follows (profile follows them AND they follow back)
                  ← 12P  = accounts that FOLLOW this profile but are NOT followed back
            -->
            <div id="n1-container" class="messages network-zone">
                <h2>🔗 Réseau N1
                    <span class="net-zone-count" id="n1-count"></span>
                </h2>
                <div class="network-filter-bar" id="n1-filter-bar">
                    <button class="net-filter-btn active"
                            data-zone="n1" data-filter="p21"
                            title="Profils que ce compte suit (→ P21)">→ P21</button>
                    <button class="net-filter-btn"
                            data-zone="n1" data-filter="p2p"
                            title="Follows mutuels (↔ P2P)">↔ P2P</button>
                    <button class="net-filter-btn"
                            data-zone="n1" data-filter="12p"
                            title="Comptes qui suivent ce profil mais non suivis en retour (← 12P)">← 12P</button>
                </div>
                <div id="n1-content" class="messages-scrollable">
                    <p style="color:var(--terminal-border);">En attente du chargement du profil…</p>
                </div>
            </div>

            <!-- ===== ZONE N2 : second-degree network (on demand) ===== -->
            <!--
                N2 = follows of follows (contacts of N1 contacts).
                Loaded on demand to avoid relay overload.
                Same P21 / P2P / 12P filters apply (approximated for N²).
            -->
            <div id="n2-container" class="messages network-zone">
                <h2>🌐 Réseau N2
                    <span class="net-zone-count" id="n2-count"></span>
                </h2>
                <div class="network-filter-bar" id="n2-filter-bar">
                    <button class="net-filter-btn active"
                            data-zone="n2" data-filter="p21"
                            title="Suivis des suivis (→ P21)">→ P21</button>
                    <button class="net-filter-btn"
                            data-zone="n2" data-filter="p2p"
                            title="Follows mutuels N² (↔ P2P)">↔ P2P</button>
                    <button class="net-filter-btn"
                            data-zone="n2" data-filter="12p"
                            title="Followers N² non mutuels (← 12P)">← 12P</button>
                </div>
                <div id="n2-content" class="messages-scrollable">
                    <button class="n2-load-btn" id="n2-load-btn" onclick="loadN2Zone()">
                        🌐 Charger le réseau N2 (follows des follows)
                    </button>
                </div>
            </div>

        </div><!-- /.terminal-body -->
    </div><!-- /.terminal-container -->

    <!--
        nostr_profile_viewer.js contains:
          - Matrix animation
          - URL/navigation management
          - Bech32 / nprofile decoders
          - fetchNostrProfile, fetchNostrMessages, fetchMuteListForProfile
          - displayNostrData (main rendering function)
          - Follow / Unfollow / Mute button handlers
          - N1 / N2 zone: fetchProfileFollowList, fetchProfileFollowers,
            computeNetworkSubset, renderNetworkPersonCard,
            loadN1Zone, displayN1Zone, loadN2Zone, displayN2Zone,
            followFromNetwork, unfollowFromNetwork, muteFromNetwork
    -->
    <script src="nostr_profile_viewer.js"></script>
</body>
</html>
